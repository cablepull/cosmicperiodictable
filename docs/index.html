    *, *::before, *::after { box-sizing: border-box; }

    #loading {
      position: fixed;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020810;

      font-size: 13px;

      gap: 12px;
      z-index: 9999;
      transition: opacity .3s;

    #loading .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(56,189,248,.15);
      border-top-color: rgba(56,189,248,.7);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  48: { desc:"A soft, toxic bluish-white metal that accumulates in kidneys and bones. Despite its toxicity, cadmium is essential for nickel-cadmium rechargeable batteries and yellow/red pigments.", facts:["Cadmium-based pigments created the brilliant yellow and red colors in Vincent van Gogh's paintings","The Itai-itai disease in Japan (1950s) was caused by cadmium contamination of rice paddies from zinc mining","Cadmium telluride (CdTe) thin-film solar panels are among the most cost-effective photovoltaic technologies"], rarity:"Uncommon", loc:"China, South Korea, Japan, Kazakhstan, Canada — almost entirely a byproduct of zinc ore smelting" },
  49: { desc:"A soft, silvery metal that squeaks when bent — 'indium cry'. It is the critical component in indium tin oxide (ITO), the transparent conductor coating every touchscreen and LCD display.", facts:["Every smartphone and tablet screen contains indium tin oxide — critical for touch sensitivity","Indium has an exceptionally low melting point (157°C) and is used in specialty solders and bearings","Global indium supply is entirely dependent on zinc mining — it has no dedicated mines of its own"], rarity:"Rare", loc:"China (world leader — 55%), South Korea, Japan, Canada — exclusively a byproduct of zinc processing" },
  50: { desc:"One of the oldest metals used by humans. Tin's combination with copper created bronze, launching the Bronze Age civilization approximately 3,500 BCE.", facts:["Tin 'plague' — a phase transformation below 13°C — caused tin buttons to crumble in Napoleonic soldiers' uniforms in the Russian winter","The tin can was invented in 1810 — but the can opener wasn't invented until 50 years later","Pure tin emits a characteristic crackling sound ('tin cry') when bent, caused by crystal deformation"], rarity:"Uncommon", loc:"China (world leader — 40%), Indonesia, Peru, Bolivia, Brazil, Congo — cassiterite (SnO2) deposits" },
  51: { desc:"A brittle, silver-white metalloid used primarily as a flame retardant and in lead-acid batteries. Antimony compounds were used as cosmetics and medicines in ancient Egypt.", facts:["Antimony trisulfide (stibnite) was ground into kohl, used as eye makeup by ancient Egyptians and Mesopotamians","Antimony-tin oxide is used as a transparent conductive coating, similar to ITO but cheaper","Antimony isotope ratios in ice cores can identify historical smelting events going back to Roman civilization"], rarity:"Uncommon", loc:"China (world leader — 60%), Russia, Bolivia, Tajikistan, Australia — stibnite (Sb2S3)" },
  52: { desc:"An extremely rare metalloid that looks like silver but is more brittle than glass. Tellurium gives garlic its distinctive smell when inhaled — even in microgram quantities.", facts:["Tellurium is rarer in Earth's crust than platinum, yet used extensively in CdTe solar panels","People exposed to trace tellurium excrete dimethyl telluride through their breath — producing a garlic-like odor for weeks","The first rewritable CDs and DVDs used tellurium alloy phase-change layers"], rarity:"Rare", loc:"China, Japan, USA, Peru, Canada — exclusively a byproduct of copper electrolytic refining (anode slime)" },
  53: { desc:"A shiny, purple-black solid that sublimates to a gorgeous violet vapor. Iodine is essential for thyroid hormone production — iodine deficiency is the world's most common preventable cause of intellectual disability.", facts:["Iodine was used as the first antiseptic in surgery — introduced by Charles Pravaz in 1828","Potassium iodide tablets are distributed near nuclear plants — iodine-131 from nuclear accidents concentrates in the thyroid","Chile's Atacama Desert holds 60% of the world's iodine reserves in ancient marine sediments"], rarity:"Uncommon", loc:"Chile (Atacama caliche deposits — world leader), Japan (underground brines), USA (Oklahoma brines)" },
  54: { desc:"The heaviest stable noble gas — about 4.5 times heavier than air. Xenon is used as a propellant for ion thrusters on spacecraft and as a general anesthetic.", facts:["Xenon ion thrusters are used on ESA's SMART-1 lunar spacecraft and NASA's Dawn asteroid probe","Xenon-128 is used as a tracer gas in pulmonary MRI scans — hyperpolarized xenon highlights airway structure in real time","Xenon difluoride was the first noble gas compound ever synthesized, shattering the belief that noble gases could not form bonds"], rarity:"Rare", loc:"Atmosphere (87 ppb), produced by fractional distillation of liquid air (extremely energy intensive)" },
  55: { desc:"The softest metal and the most electropositive element. Cesium is so reactive it explodes violently on contact with water. Cesium-133 atomic clocks define the SI second.", facts:["The SI second is defined as exactly 9,192,631,770 oscillations of cesium-133 — the basis of all modern timekeeping","Cesium atomic clocks in GPS satellites would lose only 1 second in 300 million years without relativistic corrections","Cesium was discovered in 1860 by Robert Bunsen using spectroscopy — named for its sky-blue spectral lines"], rarity:"Rare", loc:"Canada (Bernic Lake, Manitoba — Tanco Mine, 40% of world supply), Zimbabwe, Namibia" },
  56: { desc:"A dense, soft alkaline earth metal — its compounds are used in oil well drilling mud to control pressure and prevent blowouts. Barium sulfate is given as a medical 'barium meal' for GI X-rays.", facts:["Barium is toxic — but barium sulfate is so insoluble it passes through the digestive tract harmlessly","'Barium stars' are giant stars with unusually high barium in their spectra — evidence of mass transfer from a companion star","Green fireworks and signals get their color from barium chlorate and nitrate compounds"], rarity:"Common", loc:"China (world leader), India, Morocco, USA, Kazakhstan — barite (BaSO4) deposits, widespread globally" },
  57: { desc:"The first and most abundant rare earth element. Despite the 'rare' label, lanthanum is more common than tin in Earth's crust — it is just rarely concentrated enough to mine economically.", facts:["Lanthanum oxide is used in high-refractive-index glass for camera and microscope lenses","Misch metal — used in lighter flints — is about 25% lanthanum","Lanthanum nickel (LaNi5) can absorb 400 times its own volume of hydrogen gas"], rarity:"Uncommon", loc:"China (Mountain Pass analog deposits — world leader 60%+), USA (Mountain Pass, California), Australia, India" },
  58: { desc:"The most abundant rare earth element. Cerium is used in catalytic converters, polishing compounds for glass, and as a component in self-cleaning ovens.", facts:["Cerium oxide is the most effective glass polishing compound known — used to polish telescope mirrors and optical glass","The 'flint' in cigarette lighters is actually ferrocerium — an iron-cerium alloy that showers sparks when scratched","Cerium is named after the dwarf planet Ceres, discovered two years before the element in 1803"], rarity:"Common", loc:"China, USA (Mountain Pass), India, Russia, Brazil — monazite and bastnäsite ore deposits" },
  59: { desc:"A soft, silvery metal with a bright yellow-green tinge when oxidized. Praseodymium's name means 'green twin' — it was originally thought to be a single element with neodymium.", facts:["Praseodymium-neodymium alloy magnets are used in high-power motors for wind turbines and electric vehicles","Praseodymium oxide creates intense yellow-green glass used in welding goggles for protection","Praseodymium and neodymium were separated in 1885 — 40 years after their mistaken identification as one element"], rarity:"Uncommon", loc:"China (world leader), USA, Australia, India, Brazil — in monazite, bastnäsite, and xenotime deposits" },
  60: { desc:"The element that powers the modern electrification revolution. Neodymium-iron-boron (NdFeB) magnets are the strongest permanent magnets ever made — essential for EV motors, wind turbines, and earbuds.", facts:["The strongest NdFeB magnets can lift 1,000 times their own weight","A single offshore wind turbine uses up to 2 tonnes of neodymium magnets","China controls over 70% of global neodymium supply — a critical geopolitical commodity"], rarity:"Uncommon", loc:"China (Bayan Obo mine — Inner Mongolia, world's largest REE deposit), USA, Australia, India, Russia" },
  61: { desc:"The only lanthanide with no stable isotopes — every atom is radioactive. Promethium was the last naturally occurring element to be discovered, named after the Titan who stole fire from the gods.", facts:["Promethium occurs naturally only in trace amounts as a spontaneous fission product of uranium","Before atomic clocks, nuclear promethium batteries powered early missile guidance systems in the Cold War","There is less than 500 grams of promethium naturally present in Earth's entire crust at any given moment"], rarity:"Synthetic", loc:"Produced in nuclear reactors; vanishingly small natural amounts in uranium ores worldwide" },
  62: { desc:"A hard, silvery rare earth metal with the highest magnetic moment of the lanthanides at room temperature. Samarium-cobalt magnets outperform neodymium magnets in high-temperature environments.", facts:["Samarium-cobalt (SmCo) magnets were the first rare earth permanent magnets — superior to NdFeB at temperatures above 180°C","Samarium-153 is used in targeted cancer radiation therapy, particularly for bone metastases","Samarium is one of the few elements used directly in medicine as a radioactive treatment agent"], rarity:"Uncommon", loc:"China, USA (Mountain Pass), India, Russia, Australia — in monazite and bastnäsite ores" },
  63: { desc:"The most reactive rare earth element. Europium is the key component in the red phosphors of TV and computer screens — without it, color televisions as we knew them would not exist.", facts:["Europium fluorescence is used as an anti-counterfeiting measure in Euro banknotes — UV light reveals red europium emission","Europium-doped phosphors are used in fluorescent lighting and white LEDs to improve color rendering","Europium was one of the critical bottlenecks in the 1960s color TV revolution — demand nearly outstripped global supply"], rarity:"Rare", loc:"China (dominant), USA, India, Australia — in monazite and bastnäsite; only ~600 tonnes produced annually" },
  64: { desc:"A silvery-white rare earth metal with remarkable neutron absorption properties. Its MRI-enhancing compounds are used in millions of scans annually.", facts:["Gadolinium contrast agents are injected during MRI scans to highlight tumors and vascular structures","Gadolinium's magnetic moment is so large it magnetizes visibly in a strong magnetic field — useful for magnetic refrigeration research","The gadolinium garnet crystal (GGG) is used as a substrate for magnetic bubble memory devices"], rarity:"Uncommon", loc:"China (world leader), USA, India, Australia — in monazite, bastnäsite deposits" },
  65: { desc:"A soft, silvery-white rare earth metal. Terbium is critical for green phosphors in screens and solid-state devices — and is increasingly important for high-performance magnets alongside dysprosium.", facts:["Terbium is one of only four elements that is ferromagnetic at room temperature (with Fe, Ni, Co)","Terbium-doped calcium fluoride crystals are used in optical storage and lasers","The magnetostrictive alloy terfenol-D (terbium-iron-dysprosium) changes shape in a magnetic field — used in sonar transducers"], rarity:"Rare", loc:"China (world leader), USA (Mountain Pass), India, Australia — in rare earth ore deposits" },
  66: { desc:"A silvery-white rare earth metal essential for high-coercivity permanent magnets. Dysprosium additions allow neodymium magnets to maintain strength at high temperatures — critical for EV motors.", facts:["Adding 1-6% dysprosium to NdFeB magnets allows them to operate in environments up to 200°C","Dysprosium-161 is under investigation as a targeted cancer therapy agent","The name comes from the Greek 'dysprositos' meaning hard to get — it was notoriously difficult to isolate in the 19th century"], rarity:"Rare", loc:"China (world leader — Inner Mongolia, Sichuan), USA, Australia — in ion-adsorption clay deposits and hard rock REE ores" },
  67: { desc:"A soft, silvery-white rare earth metal that has the highest magnetic moment of any element in a magnetic field. Holmium poles are used in NMR magnets to concentrate magnetic flux.", facts:["Holmium has the highest magnetic moment per atom of any naturally occurring element","Holmium lasers are used in medical procedures including kidney stone fragmentation and prostate surgery","Named after Stockholm (Holmia in Latin) — discovered by Swedish chemists in 1879"], rarity:"Rare", loc:"China, USA, India, Australia, Brazil — in monazite and bastnäsite; produced almost exclusively in China" },
  68: { desc:"A soft, malleable silvery-white metal. Erbium-doped fiber amplifiers are the backbone of the global internet — erbium atoms amplify light signals in fiber optic cables over transcontinental distances.", facts:["Every submarine fiber optic cable spanning the oceans uses erbium-doped fiber amplifiers","Erbium gives rose-tinted glass its characteristic pink color — used in decorative glassware","Erbium YAG lasers are used in dentistry and dermatology — they are strongly absorbed by water in tissue"], rarity:"Rare", loc:"China, USA, India, Australia — in monazite, bastnäsite, and xenotime deposits" },
  69: { desc:"The rarest stable rare earth element. Thulium has very few commercial applications, but thulium-170 produces X-rays when bombarded with neutrons — used in portable X-ray devices.", facts:["Thulium-based portable X-ray sources have been used in the field without electrical power","Thulium was isolated in 1879 but remained a laboratory curiosity for over 80 years due to extreme rarity","Named after 'Thule' — the ancient name for the far north of Scandinavia"], rarity:"Very Rare", loc:"China, USA, India, Australia — found only in trace concentrations in rare earth ore deposits" },
  70: { desc:"A soft, silvery rare earth that behaves unusually — it becomes superconducting under pressure. Ytterbium's precise atomic transitions are used in next-generation atomic clocks more accurate than cesium.", facts:["Ytterbium optical lattice clocks lose less than 1 second in 14 billion years — surpassing cesium atomic clocks","Ytterbium lasers are widely used in industrial cutting and welding applications","Along with yttrium, erbium, and terbium, ytterbium is one of four elements named after Ytterby, Sweden"], rarity:"Rare", loc:"China, USA, India, Brazil, Australia — in monazite, bastnäsite, and ion-adsorption clay deposits" },
  71: { desc:"The last and densest rare earth element. Lutetium is the hardest and highest-melting lanthanide. Its compounds are used in PET scan detectors and as catalysts in oil refining.", facts:["Lutetium oxyorthosilicate (LSO) scintillator crystals are used in modern PET scanners for cancer detection","Lutetium was the last element to be separated from the rare earths — confirmed in 1907 after years of dispute","Lu-DOTATATE (lutetium-177 labeled) is an FDA-approved targeted therapy for neuroendocrine tumors"], rarity:"Rare", loc:"China (dominant), USA, India, Australia — in monazite; among the rarest rare earths commercially" },
  72: { desc:"Always found alongside zirconium due to similar ionic radii — until 1923 it was not recognized as a distinct element. Hafnium is transparent to neutrons when thin and absorbs them when thick — perfect for reactor control.", facts:["Hafnium was the last stable element to be discovered — predicted by Bohr and found using X-ray spectroscopy of zirconium ore","Intel introduced hafnium oxide as a gate dielectric in microprocessors in 2007 — a major breakthrough after 40 years of silicon dioxide","Hafnium crucibles are used to melt refractory metals that would dissolve steel containers"], rarity:"Rare", loc:"Australia, South Africa, China, USA — separated from zircon sand as a byproduct; always co-located with zirconium" },
  73: { desc:"A conflict mineral — much of the world's supply comes from Central Africa as 'coltan', mined in conditions linked to armed conflict. Tantalum's biocompatibility makes it ideal for surgical implants.", facts:["A tantalum capacitor sits in virtually every smartphone, computer, and medical device — 60% of tantalum goes to electronics","DRC and Rwanda supply about 40% of world tantalum — coltan mining has been linked to funding armed groups in the Congo conflict","Tantalum was named after Tantalus in Greek mythology — because it stubbornly refused to absorb acid, just as Tantalus could not reach his food"], rarity:"Rare", loc:"DRC (Congo) and Rwanda (40%), Australia (Wodgina mine), Brazil, Canada — columbite-tantalite (coltan) ore" },
  74: { desc:"The metal with the highest melting point (3,422°C) and highest tensile strength at high temperatures. Tungsten filaments made incandescent light bulbs practical — and tungsten carbide now machines the hardest materials.", facts:["Tungsten's symbol 'W' comes from its German name Wolfram — miners called it wolf's froth because it consumed tin during smelting","Tungsten carbide is nearly as hard as diamond and is used to drill through rock in oil wells and mine shafts","The filament in a traditional incandescent bulb is a tungsten wire thinner than a human hair, operating at 2,500°C"], rarity:"Uncommon", loc:"China (world leader — 80% of global supply), Russia, Canada, Vietnam, Bolivia — wolframite, scheelite deposits" },
  75: { desc:"One of the rarest stable elements in Earth's crust. Rhenium has the second highest melting point and the highest boiling point of any element. It is critical for single-crystal superalloy turbine blades in jet engines.", facts:["A single-crystal turbine blade in a modern jet engine contains several grams of rhenium and operates above the melting point of most metals","The price of rhenium spiked to $12,000/kg in 2008 due to demand from the aviation industry","The first high-temperature catalyst for petroleum refining used platinum-rhenium alloys"], rarity:"Very Rare", loc:"Chile (byproduct of Escondida copper-molybdenum), USA, Kazakhstan, Russia — almost entirely a byproduct of molybdenite processing" },
  76: { desc:"The densest naturally occurring element — a cubic centimeter of osmium weighs 22.59 grams. Its extreme hardness means osmium alloys are used in fountain pen tips and scientific instrument pivots.", facts:["Osmium and iridium compete for the title of densest element — the measurement is so difficult both values remain contested","Osmium tetroxide is used to stain biological tissues for electron microscopy — it is also violently toxic","The name comes from Greek 'osme' (smell) — osmium tetroxide has a sharp, acrid odor even in parts-per-billion concentrations"], rarity:"Very Rare", loc:"Russia (Norilsk), South Africa (Bushveld), Zimbabwe — found only in platinum-group ore deposits" },
  77: { desc:"The second densest element and the most corrosion-resistant metal known. An iridium layer in rock worldwide marks the Cretaceous-Paleogene boundary — evidence of the asteroid that killed the dinosaurs.", facts:["The K-Pg boundary iridium layer is 160 times higher than normal crust — the primary evidence for the asteroid impact hypothesis","Iridium-osmium alloys are used for the tips of compass bearings, scientific instruments, and some pen nibs","The first GPS satellites carried iridium-alloy components — giving the Iridium satellite constellation its name"], rarity:"Very Rare", loc:"South Africa (Bushveld Igneous Complex — world leader), Russia (Norilsk), Zimbabwe, Canada — in PGM deposits" },
  78: { desc:"A dense, malleable precious metal prized for its catalytic properties and resistance to corrosion. Platinum was considered inferior to silver by pre-Columbian South Americans who called it 'platina' (little silver).", facts:["About 40% of all goods manufactured today are produced using a platinum catalyst at some stage","The original kilogram standard (1889 to 2019) was a cylinder of 90% platinum, 10% iridium kept in Paris","Cisplatin — a platinum compound — is one of the most effective chemotherapy drugs, used to treat testicular, ovarian, and lung cancers"], rarity:"Rare", loc:"South Africa (70% — Bushveld Igneous Complex), Russia (Norilsk — 15%), Zimbabwe, Canada, USA" },
  79: { desc:"The ultimate store of value across 5,000 years of civilization. Gold's resistance to corrosion, rarity, and lustrous beauty make it uniquely suited for currency and ornamentation.", facts:["All the gold ever mined would fit in a cube about 22 meters on each side","Gold is biocompatible and used in dentistry, arthritis treatment, and as a coating on astronaut visors to filter solar radiation","The largest gold nugget ever found — the 'Welcome Stranger' (1869, Australia) — weighed 72 kg"], rarity:"Rare", loc:"China, Australia (Kalgoorlie), Russia, USA (Nevada — Carlin Trend), Canada, South Africa (Witwatersrand)" },
  80: { desc:"The only metal that is liquid at room temperature. Mercury's neurotoxicity was not understood for centuries — it poisoned hatmakers (inspiring 'Mad Hatter'), alchemists, and thermometer workers.", facts:["Mercury was used in gold mining for millennia via amalgamation — this process still contaminates river systems in illegal Amazon mining","The planet Mercury is named for the element's rapid movement in a vial — evoking the fleet-footed Roman messenger god","Dental amalgam fillings are 50% mercury and have been used for 160 years — their safety has been confirmed in numerous studies"], rarity:"Uncommon", loc:"China (world leader), Spain (Almaden — historically world's largest mercury mine, now closed), Kyrgyzstan — cinnabar (HgS)" },
  81: { desc:"A soft, malleable post-transition metal — highly toxic, accumulating in organs and bones. Thallium was once used as a rat poison and to treat ringworm before being banned.", facts:["Thallium poisoning is extremely difficult to detect and was used in several famous murders — earning it the nickname 'the poisoner's poison'","Thallium-201 is used in cardiac stress tests — its uptake by heart muscle can identify reduced blood flow","KRS-5 (thallium bromoiodide) crystals are among the best infrared-transmitting materials known, used in spectroscopy"], rarity:"Rare", loc:"China, Kazakhstan, Russia, Belgium — primarily a byproduct of zinc/lead smelting; trace in pyrite (fool's gold)" },
  82: { desc:"The heaviest stable element. Lead's high density, malleability, and low cost made it ubiquitous in ancient plumbing, paint, and fuel — with devastating public health consequences now well understood.", facts:["Roman water pipes were made of lead — the Latin 'plumbum' gives us the chemical symbol Pb and the word 'plumber'","Lead-acid batteries, invented in 1859, remain the most widely used rechargeable battery technology due to cost and reliability","Removal of lead from gasoline between 1975 and 2000 correlated with a dramatic drop in violent crime rates in many countries"], rarity:"Common", loc:"China (world leader), Australia (Broken Hill), Peru, Mexico, USA, Russia — galena (PbS) deposits" },
  83: { desc:"The heaviest element with a stable isotope — bismuth-209 was thought stable until 2003 when it was found radioactive with a half-life of 19×10^18 years. Bismuth is used in medicine as a non-toxic heavy metal substitute.", facts:["Pepto-Bismol contains bismuth subsalicylate — bismuth kills H. pylori bacteria and soothes stomach lining","Bismuth expands slightly when it solidifies (like water) — and forms spectacular hopper crystals with iridescent oxide layers","Bismuth alloys are used in fire suppression systems — the alloy melts at 70°C, releasing water from sprinklers"], rarity:"Uncommon", loc:"China (world leader), Peru, Mexico, Japan, Bolivia — in sulfide ores, often with lead and copper deposits" },
  84: { desc:"A radioactive element discovered by Marie and Pierre Curie in 1898. Named after Poland (Marie's homeland), polonium is one of the most toxic substances known — a microgram can kill a person.", facts:["The assassination of Alexander Litvinenko in London (2006) used polonium-210 — detectable uniquely because of its intense alpha radiation","Polonium-210 occurs naturally in tobacco — combustion of one pack per day equates to ~300 chest X-rays worth of radiation annually","Marie Curie's notebooks are still too radioactive to handle safely — stored in lead-lined containers in Paris"], rarity:"Very Rare", loc:"Produced in nuclear reactors (Bi-209 neutron bombardment); natural trace amounts in uranium ores and tobacco leaves" },
  85: { desc:"The rarest naturally occurring element on Earth. At any given moment, the entire planet contains only about 28 grams of astatine — all of it decaying with a maximum half-life of 8.1 hours.", facts:["Only about 0.05 micrograms of astatine have ever been produced artificially","Astatine-211 is highly promising for targeted alpha therapy cancer treatment — it bonds like iodine and delivers a localized killing radiation dose","The name comes from Greek 'astatos' meaning unstable — it has no stable isotopes and can never be accumulated"], rarity:"Extremely Rare", loc:"Trace amounts worldwide in uranium-bearing minerals (natural decay product); produced at cyclotrons in USA, Sweden, Germany, Russia" },
  86: { desc:"A colorless, radioactive noble gas produced by the natural decay of radium and uranium in the Earth's crust. Radon is the second leading cause of lung cancer in the US after smoking.", facts:["Radon accumulates in poorly ventilated basements — EPA recommends testing all US homes, especially on granite bedrock","Radon-222 has a half-life of only 3.8 days — but its decay products are solids that adhere to lung tissue","Ancient spas in Eastern Europe marketed radon-rich spring water as health tonics — obliviously exposing patrons to radiation"], rarity:"Rare", loc:"Naturally emitted from uranium and thorium-bearing rocks worldwide — especially granite regions (Cornwall UK, Scandinavia, parts of USA)" },
  87: { desc:"The second rarest naturally occurring element. Francium is so radioactive that all the atoms spontaneously disintegrate within minutes — scientists have never seen a macroscopic sample.", facts:["Only about 20-30 francium atoms exist naturally on Earth at any given instant","Francium was the last element to be discovered in nature — isolated in 1939 by Marguerite Perey, who named it after her homeland","Francium's boiling point (~670°C) has never been measured directly — it is calculated by extrapolation from cesium"], rarity:"Extremely Rare", loc:"Natural decay product in uranium/thorium ores worldwide; produced in tiny amounts at nuclear facilities (TRIUMF Canada, CERN Switzerland)" },
  88: { desc:"A shining white alkaline earth metal, intensely radioactive. Discovered by the Curies in 1898 — its discovery led directly to the development of nuclear physics and radiation therapy.", facts:["Marie Curie carried a test tube of radium in her pocket and kept a glowing vial on her bedside table — not knowing the danger","Radium-226 was painted on watch dials to make them glow until 1968 — the 'Radium Girls' who painted dials developed devastating radiation cancers","Radium emits a faint blue glow from the ionization of surrounding air molecules"], rarity:"Very Rare", loc:"Trace in uranium ores worldwide — pitchblende (Czech Republic — Joachimsthal), Great Bear Lake (Canada), DRC" },
  89: { desc:"A soft, highly radioactive metal that glows blue in the dark from its intense radiation ionizing surrounding air. Actinium gives its name to the entire actinide series.", facts:["Actinium-225 is being developed as a targeted alpha therapy agent for prostate cancer and leukemia","Actinium is over 150 times more radioactive than radium — it produces an eerie blue glow visible in complete darkness","There is only about 0.2 mg of actinium in each ton of uranium ore — making natural extraction impractical"], rarity:"Very Rare", loc:"Trace in uranium ores worldwide; produced commercially by neutron irradiation of radium-226 in nuclear reactors" },
  90: { desc:"A weakly radioactive, silvery metal with energy potential exceeding uranium. Thorium is the most abundant radioactive element in Earth's crust — about three times more abundant than uranium.", facts:["India holds one-third of the world's thorium reserves and is building thorium molten salt reactors for energy independence","The incandescent gas mantles in camping lanterns are made of thorium oxide — the most thermally stable oxide known","Thorium-228 was used as a cancer treatment in the 1950s — with disastrous long-term outcomes not understood at the time"], rarity:"Uncommon", loc:"India (monazite beach sands of Kerala and Tamil Nadu), Brazil, Australia, USA — monazite placer deposits" },
  91: { desc:"A dense, toxic, and intensely radioactive metal. Protactinium-231 decays to actinium — hence the name. It exists only in uranium ores and is one of the most difficult elements to work with safely.", facts:["The entire world stock of protactinium-231 is about 125 grams, held at the UK's Atomic Energy Authority in Harwell","Protactinium/thorium ratios in ocean sediments are used to reconstruct past ocean circulation patterns","Processing protactinium in bulk requires a nuclear facility — it is so radioactive that normal chemistry is essentially impossible"], rarity:"Very Rare", loc:"Trace in uranium ores worldwide; UK (Harwell — world's largest stock, concentrated from nuclear processing)" },
  92: { desc:"The heaviest naturally occurring element. Uranium's discovery of fission in 1938 changed history. It is both the fuel for 10% of global electricity and the material for nuclear weapons.", facts:["Uranium glass (Vaseline glass) glows brilliant green under UV light and was fashionable in Victorian tableware — it is only mildly radioactive","The Oklo deposit in Gabon had a natural nuclear reactor operating 1.7 billion years ago","The Athabasca Basin in Saskatchewan, Canada contains uranium ore grades up to 20% — the world's richest deposits"], rarity:"Uncommon", loc:"Kazakhstan (world leader — 40%), Canada (Athabasca Basin), Australia, Namibia, Niger, Russia — uraninite/pitchblende" },
  93: { desc:"The first transuranic element — beyond uranium in the periodic table. Neptunium was discovered in 1940 by bombarding uranium with neutrons. Named after the next planet beyond Uranus.", facts:["Neptunium-237 has a half-life of 2.14 million years — it accumulates as a byproduct in spent nuclear fuel","Tiny amounts of neptunium occur naturally in uranium ores as a decay product of uranium-238","Neptunium was produced by the first nuclear reactor (Chicago Pile-1) in 1942 as an impurity in plutonium production"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide; trace amounts in uranium ores (about 10 parts per billion in pitchblende)" },
  94: { desc:"Perhaps the most consequential element ever synthesized. Plutonium powers nuclear weapons and deep-space probes — the New Horizons spacecraft that flew past Pluto was powered by plutonium.", facts:["The bomb dropped on Nagasaki contained only 6.2 kg of plutonium — most of which fissioned in about one microsecond","Plutonium-238 is used in radioisotope thermoelectric generators — the Voyager probes still send signals powered by Pu-238 launched in 1977","Plutonium metal has 6 allotropic phases — causing density differences of 25% between forms"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide; trace amounts in uranium ores (less than 1 part per trillion)" },
  95: { desc:"A silvery radioactive metal. Americium-241 is the most commercially distributed radioactive isotope in the world — it is in the ionization chamber of virtually every smoke detector.", facts:["About 0.3 micrograms of americium-241 in a smoke detector alpha-ionizes air — smoke disrupts the ion current triggering the alarm","Americium was secretly produced during the Manhattan Project and declassified in 1945","Americium-241 is recovered from aged plutonium in nuclear weapons stockpiles — Pu-241 decays into Am-241 over decades"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide from plutonium; also recovered from nuclear weapons components" },
  96: { desc:"Named after the Curies — Pierre and Marie — the only couple to have an element named in their honor. Curium is intensely radioactive and thermally hot — it glows red in the dark from its own heat.", facts:["A few grams of curium-244 glow cherry-red in the dark from the heat of its own radioactive decay","Curium was secretly synthesized during the Manhattan Project and not announced until after World War II","The Mars rovers used curium-244 X-ray sources in their Alpha Particle X-Ray Spectrometers to analyze Martian rocks"], rarity:"Synthetic", loc:"Produced in nuclear reactors at Oak Ridge (USA), Mayak (Russia), and other nuclear facilities worldwide" },
  97: { desc:"Named after the University of California, Berkeley — where it was first synthesized. Berkelium is a radioactive metal produced in milligram quantities — the most ever produced is about a gram.", facts:["Berkelium-249 is the primary target material for synthesizing heavier elements — including tennessine and oganesson","Synthesis of a visible amount of berkelium takes several months in a high-flux nuclear reactor","Berkelium was first synthesized in 1949 using only a few micrograms of material"], rarity:"Synthetic", loc:"Produced exclusively at Oak Ridge National Laboratory (Tennessee, USA) using the High Flux Isotope Reactor" },
  98: { desc:"Named after California. Californium-252 is the most intense known neutron source — a microgram emits 170 million neutrons per second — used to start nuclear reactors and detect land mines.", facts:["Californium-252 neutron sources have been used to detect land mines in Bosnia and are used routinely in oil well logging","One microgram of californium-252 costs about $27 million — making it one of the most expensive substances on Earth per gram","Californium is produced in such small quantities that its chemistry has largely been studied using single atoms or small clusters"], rarity:"Synthetic", loc:"Produced at Oak Ridge National Laboratory (USA) and the Research Institute of Atomic Reactors (Russia — Dimitrovgrad)" },
  99: { desc:"Named after Albert Einstein. Einsteinium was discovered in the debris of the first hydrogen bomb test (Ivy Mike, 1952) — classified for years. It is so radioactive that its chemistry is extremely difficult to study.", facts:["Einsteinium was discovered in fallout from the 1952 Ivy Mike hydrogen bomb test at Enewetak Atoll in the Pacific","Only microgram quantities can be produced — severe self-irradiation causes crystals to glow visibly in the dark","In 2021, scientists finally characterized einsteinium's chemistry — studying just 200 nanograms, less than a speck of dust"], rarity:"Synthetic", loc:"Produced in minute quantities at Oak Ridge (USA) and nuclear facilities in Russia and Europe" },
  100:{ desc:"Named after nuclear physicist Enrico Fermi. Fermium was also discovered in H-bomb fallout — it is the heaviest element that can be formed by nuclear reactions in stars (r-process nucleosynthesis).", facts:["Fermium is the heaviest element that can be created by neutron bombardment — heavier elements require particle accelerators","Fermium-257 has the longest half-life of any fermium isotope at 100.5 days","Less than a microgram of fermium has ever been produced in total by all the world's nuclear facilities"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide, primarily at Oak Ridge National Laboratory (USA)" },
  101:{ desc:"Named after Dmitri Mendeleev — the creator of the periodic table. Mendelevium was the first element produced one atom at a time — synthesized by bombarding einsteinium with helium ions.", facts:["Only about 1 million atoms of mendelevium-256 were synthesized in the original 1955 experiment","Mendelevium-258 has a half-life of 51.5 days — long enough to study its basic chemistry in small quantities","Glenn Seaborg and his team drove through the night to confirm the discovery before announcing it — hiding results due to Cold War secrecy"], rarity:"Synthetic", loc:"Produced in particle accelerators — LBNL (Berkeley, USA), Oak Ridge, Dubna (Russia)" },
  102:{ desc:"Named after Alfred Nobel, inventor of dynamite and founder of the Nobel Prizes. Nobelium's discovery was disputed between Soviet and American teams during the Cold War — and both got it wrong before Sweden confirmed it.", facts:["The Soviet and American teams both initially made errors in claiming the discovery — confirmed by the Nobel Institute in Sweden in 1957","The Dubna team in Russia was the first to correctly characterize nobelium's chemistry","Nobelium-259 has a half-life of 58 minutes — sufficient to study basic chemical properties"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia), LBNL (Berkeley, USA), and GSI (Darmstadt, Germany)" },
  103:{ desc:"Named after Ernest Lawrence, inventor of the cyclotron. The last actinide element and the last element in the f-block. Lawrencium's synthesis marked the completion of the actinide series.", facts:["Lawrencium-266 has a half-life of about 11 hours — among the longest for any lawrencium isotope","Lawrencium has one valence electron outside a filled f-shell — making its chemistry resemble the lighter lanthanide lutetium","The discovery was again disputed between American (Berkeley) and Soviet (Dubna) teams during the Cold War"], rarity:"Synthetic", loc:"Produced at LBNL (Berkeley, USA), JINR (Dubna, Russia), and RIKEN (Japan)" },
  104:{ desc:"The first transactinide element and the first in the 6d transition series. Named after Ernest Rutherford, who discovered the atomic nucleus.", facts:["The synthesis of rutherfordium opened the 'superheavy element' era — elements so massive their chemistry challenges quantum theory","Rutherfordium was the subject of intense Cold War priority disputes — the US named it rutherfordium, the Soviets called it kurchatovium","Relativistic quantum effects make rutherfordium behave like hafnium chemically — the first confirmation of relativistic chemistry"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) and LBNL (Berkeley, USA) by bombarding californium-249 or curium with light ions" },
  105:{ desc:"Named after Dubna, Russia, where it was discovered. Dubnium is a transactinide superheavy metal that exists for only seconds. Its chemistry is studied one atom at a time using ingenious microfluidic techniques.", facts:["A single experiment determining dubnium's chemistry may take weeks of reactor time to produce just a few hundred atoms","Dubnium's chemistry mirrors niobium and tantalum as predicted by the periodic table — confirming its placement","The element's other proposed name, hahnium (after Otto Hahn), was officially withdrawn in 1997 by IUPAC"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia), GSI (Darmstadt, Germany), and LBNL (Berkeley, USA)" },
  106:{ desc:"Named after Glenn T. Seaborg — the only person to have a chemical element named after them while still alive. Seaborgium's chemistry was studied in 1997 with just seven atoms, confirming it behaves like tungsten.", facts:["Glenn Seaborg co-discovered 10 transuranic elements — more than any other scientist in history","A 1997 experiment studied seaborgium's chemistry using 7 atoms over 3 weeks, comparing behavior to molybdenum and tungsten","Seaborgium's longest-lived isotope has a half-life of 14 minutes — extremely short for chemistry experiments"], rarity:"Synthetic", loc:"Produced at LBNL (Berkeley, USA), GSI (Darmstadt, Germany), and FLNR (Dubna, Russia)" },
  107:{ desc:"Named after Niels Bohr, father of quantum atomic theory. Bohrium was first synthesized in 1981 and exists for only seconds. Its chemical behavior has been inferred but not directly studied.", facts:["Bohrium-270 has a half-life of only 61 seconds — the longest known for any bohrium isotope","The synthesis of one atom of bohrium takes bombarding billions of bismuth nuclei with chromium ions","Bohrium is predicted to behave like rhenium — sitting directly below it in Group 7 of the periodic table"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany), JINR (Dubna, Russia), and RIKEN (Japan)" },
  108:{ desc:"Named after Hesse (Hassia in Latin), the German state containing Darmstadt's GSI laboratory. Hassium is one of the few superheavy elements whose chemistry has been experimentally studied.", facts:["In 2002, hassium's chemistry was studied using just 6 atoms — confirming it forms a volatile tetroxide like osmium","Hassium tetroxide was the first compound of a superheavy element studied using gas chromatography","Hassium-269 has a half-life of about 16 seconds — long enough for rudimentary chemical experiments"], rarity:"Synthetic", loc:"Produced exclusively at GSI (Darmstadt, Germany) by bombarding lead-208 with iron-58" },
  109:{ desc:"Named after physicist Lise Meitner, who discovered nuclear fission alongside Otto Hahn but was controversially excluded from the Nobel Prize. Meitnerium exists for only milliseconds.", facts:["Lise Meitner was nominated for the Nobel Prize 48 times without winning — meitnerium helps correct this historical injustice","Meitnerium-278 has a half-life of about 7.6 seconds — the longest known isotope","Meitnerium's chemistry has never been studied — it decays too rapidly for any chemical investigation"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany) using heavy ion bombardment of bismuth targets" },
  110:{ desc:"Named after Darmstadt, Germany — where it was first synthesized in 1994. Darmstadtium exists for milliseconds and no chemical properties have been measured — only predicted from relativistic quantum calculations.", facts:["Darmstadtium-281 has a half-life of about 12.7 seconds — the longest known","Theoretical calculations suggest darmstadtium should be a noble metal similar to platinum, sitting below it in the table","Darmstadtium was produced in a pioneering experiment that created only a few atoms over several weeks"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany), RIKEN (Japan), and JINR (Dubna, Russia)" },
  111:{ desc:"Named after Wilhelm Rontgen, discoverer of X-rays. Roentgenium was first synthesized in 1994 at GSI Darmstadt. Its chemistry is entirely theoretical — only a few atoms have ever been created.", facts:["Wilhelm Rontgen was the first Nobel laureate in physics (1901) for discovering X-rays in 1895","Roentgenium-282 has a half-life of about 100 seconds — enough for future chemical study in principle","Relativistic effects in roentgenium are so strong its 6d electrons begin to behave like core electrons"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany) and confirmed at RIKEN (Japan) and JINR (Dubna, Russia)" },
  112:{ desc:"Named after Nicolaus Copernicus. Copernicium was created in 1996. Relativistic effects are so extreme that copernicium is predicted to be a gas or volatile liquid at room temperature.", facts:["Copernicium is predicted to behave like a noble gas due to extreme relativistic stabilization of its 7s electrons","Copernicium-285 has a half-life of 29 seconds — the longest known for any copernicium isotope","The name was accepted by IUPAC on Copernicus' 537th birthday, February 19, 2010"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany); synthesis confirmed at RIKEN (Japan) and FLNR (Dubna, Russia)" },
  113:{ desc:"Named after Japan (Nihon). Nihonium is the first element discovered in Asia and the first to be named by an Asian research institution. The RIKEN team spent 9 years making just 3 atoms.", facts:["RIKEN's synthesis was confirmed after bombarding zinc-70 onto bismuth-209 for 553 days spread over 9 years","Japan received IUPAC naming rights in 2016 — the first Asian country to discover and name a chemical element","Nihonium-286 has a half-life of about 9.5 seconds — decay chains are used to confirm synthesis"], rarity:"Synthetic", loc:"Discovered and produced at RIKEN (Wako, Saitama, Japan)" },
  114:{ desc:"Named after the Flerov Laboratory of Nuclear Reactions in Dubna, Russia — where it was synthesized. Flerovium is predicted to be an extremely dense, short-lived metal with anomalous relativistic behavior.", facts:["Flerovium was first synthesized in 1999 in a collaboration between Dubna and Lawrence Livermore National Laboratory","The 'island of stability' theory predicts nuclei near Z=114, N=184 might have longer half-lives — flerovium isotopes are approaching this region","Flerovium-289 has a half-life of about 2.6 seconds — short, but enough to study in future experiments"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Lawrence Livermore National Laboratory (USA)" },
  115:{ desc:"Named after Moscow Oblast, Russia. Moscovium was first synthesized in 2003. It sits below bismuth in the periodic table and is predicted to be a semi-metallic solid with limited stability.", facts:["Moscovium was briefly the subject of a conspiracy theory claiming it was the element responsible for UFO propulsion systems — completely unfounded","Moscovium-290 has a half-life of about 0.65 seconds — one of the shortest for elements with confirmed chemistry predictions","The synthesis uses calcium-48 ions bombarding americium-243 targets"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Oak Ridge National Laboratory (USA)" },
  116:{ desc:"Named after Lawrence Livermore National Laboratory in Livermore, California. Livermorium sits below polonium in the periodic table — and like polonium is expected to be a solid metal, but with a half-life of milliseconds.", facts:["Livermorium was first synthesized in 2000 in a Dubna-Livermore collaboration that has produced many of the heaviest elements","The synthesis requires curium-248 targets irradiated with calcium-48 ions — a single experiment can take months","Livermorium-293 has a half-life of about 60 milliseconds — among the more stable superheavy isotopes"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Lawrence Livermore National Laboratory (USA)" },
  117:{ desc:"Named after Tennessee, home of Oak Ridge National Laboratory — which provided the crucial californium-249 and berkelium-249 targets. Tennessine sits below astatine and is the second heaviest halogen.", facts:["Tennessine required berkelium targets that took 250 days to produce at Oak Ridge's High Flux Isotope Reactor","The synthesis was confirmed in 2010 in a joint Russia-USA experiment at JINR Dubna","Tennessine-294 has a half-life of 51 milliseconds — longer than predicted, offering a hint of the 'island of stability'"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) using targets from Oak Ridge National Laboratory and Vanderbilt University (USA)" },
  118:{ desc:"The heaviest element ever confirmed. Named after Yuri Oganessian, the world's leading superheavy element physicist — the first living person honored with an element name (alongside Seaborg). Only 5 atoms have ever been created.", facts:["Oganesson is the only synthetic noble gas — but relativistic effects are so strong it is predicted to be a solid at room temperature","The 5 confirmed atoms of oganesson decay in under 1 millisecond — chemistry is currently impossible","Oganesson has the highest atomic number and mass of any confirmed element — and likely the highest that will ever be named"], rarity:"Synthetic", loc:"Produced exclusively at JINR (Dubna, Russia) by bombarding californium-249 with calcium-48 ions; only 5 atoms ever created" },
};

// ── lookups ──────────────────────────────────────
// standard pos map: "row,col" -> element
const STD_MAP = {};
EL.forEach(e => { STD_MAP[`${e[6]},${e[7]}`] = e; });
// Janet pos map: "row,col" -> element
const JAN_MAP = {};
EL.forEach(e => { const p=JANET_POS[e[0]]; if(p) JAN_MAP[`${p[0]},${p[1]}`]=e; });

function getNeighbor(el, dir, view) {
  let r, c;
  if (view === 'janet') {
    const p = JANET_POS[el[0]]; if(!p) return null;
    [r, c] = p;
  } else {
    [r, c] = [el[6], el[7]];
  }
  const [dr, dc] = dir==='up'?[-1,0]:dir==='down'?[1,0]:dir==='left'?[0,-1]:[0,1];
  const map = view==='janet'?JAN_MAP:STD_MAP;
  return map[`${r+dr},${c+dc}`] || null;
}

function enColor(en) {
  if (en === null || en === undefined) return '#3d3d5c';
  const t = (en - 0.7) / (4.0 - 0.7);
  const r = Math.round(59 + t * (239 - 59));
  const g = Math.round(130 + (t < 0.5 ? t * 2 * (200 - 130) : (1 - (t-0.5)*2) * (200 - 68) + 68));
  const b = Math.round(246 - t * (246 - 68));
  return `rgb(${r},${g},${b})`;
}

// ── BohrCanvas ───────────────────────────────────
function dispCount(cnt, isVal) { return isVal ? Math.min(cnt,12) : Math.min(cnt,8); }

function BohrCanvas({ el }) {
  const ref = useRef(null);
  const rafRef = useRef(null);
  const stateRef = useRef(null);
  const [num, sym, , cat, shells] = el;
  const color = CATS[cat].c;

  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const SZ = 290;
    canvas.width = SZ*dpr; canvas.height = SZ*dpr;
    canvas.style.width = SZ+'px'; canvas.style.height = SZ+'px';
    const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=SZ/2, cy=SZ/2;
    const actShells = shells.filter(c=>c>0);
    const nS = actShells.length, vi = nS-1;
    const nucR=16, minR=nucR+20, maxR=cx-16;
    const radii = actShells.map((_,i)=>nS===1?(minR+maxR)/2:minR+(maxR-minR)*i/(nS-1));

    if (!stateRef.current || stateRef.current.num!==num) {
      stateRef.current = { num, t:0,
        stars: Array.from({length:45},()=>({x:Math.random()*SZ,y:Math.random()*SZ,r:Math.random()*.8+.2,a:Math.random()*.5+.15,tw:Math.random()*Math.PI*2})),
        angles: actShells.map((cnt,si)=>{const dc=dispCount(cnt,si===vi);return Array.from({length:dc},(_,ei)=>2*Math.PI*ei/dc+si*.42);}),
      };
    }
    const SPEEDS = [3.2,1.6,.85,.48,.28,.16,.10];
    let last=null;

    function frame(ts) {
      if (!last) last=ts;
      const dt=Math.min((ts-last)/1000,.05); last=ts;
      stateRef.current.t+=dt;
      const t=stateRef.current.t;
      stateRef.current.angles=stateRef.current.angles.map((arr,si)=>arr.map(a=>a+SPEEDS[Math.min(si,6)]*dt));
      ctx.fillStyle='#020810'; ctx.fillRect(0,0,SZ,SZ);
      stateRef.current.stars.forEach(s=>{
        const tw=.4+.6*Math.sin(t*1.5+s.tw);
        ctx.fillStyle=`rgba(255,255,255,${s.a*tw})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      });
      for(let si=nS-1;si>=0;si--) {
        const cnt=actShells[si], r=radii[si], isVal=si===vi;
        ctx.save();
        if(isVal){ctx.shadowBlur=14;ctx.shadowColor=color;}
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=isVal?color+'bb':'rgba(140,170,220,0.15)'; ctx.lineWidth=isVal?1.8:.7; ctx.stroke();
        ctx.restore();
        ctx.font=`${isVal?'bold ':''} 8px monospace`;
        ctx.fillStyle=isVal?color:'rgba(140,170,220,0.38)'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(`${SHL[si]}:${cnt}`,cx,cy-r-3);
        const dc=dispCount(cnt,isVal);
        stateRef.current.angles[si].slice(0,dc).forEach(angle=>{
          const ex=cx+r*Math.cos(angle), ey=cy+r*Math.sin(angle);
          if(isVal){
            const g=ctx.createRadialGradient(ex,ey,0,ex,ey,8);
            g.addColorStop(0,'#fff'); g.addColorStop(.3,color); g.addColorStop(1,'transparent');
            ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ex,ey,8,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ex,ey,1.8,0,Math.PI*2); ctx.fill();
          } else {
            ctx.fillStyle=si===0?'rgba(210,230,255,.85)':'rgba(160,190,240,.5)';
            ctx.beginPath(); ctx.arc(ex,ey,si===0?2.1:1.6,0,Math.PI*2); ctx.fill();
          }
        });
        if(!isVal&&cnt>dc){ctx.fillStyle='rgba(140,170,220,.4)';ctx.font='7.5px monospace';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(`x${cnt}`,cx+r+4,cy);}
      }
      const pulse=1+.12*Math.sin(t*2.8);
      const ng=ctx.createRadialGradient(cx,cy,0,cx,cy,nucR*2.2*pulse);
      ng.addColorStop(0,'rgba(255,255,255,.95)'); ng.addColorStop(.18,color+'ee'); ng.addColorStop(.5,color+'44'); ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(cx,cy,nucR*2.2*pulse,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,nucR,0,Math.PI*2); ctx.fillStyle='#060d1e'; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=1.8; ctx.stroke();
      const dots=Math.min(num,7);
      for(let i=0;i<dots;i++){const a=(2*Math.PI*i/dots)+t*.5;ctx.fillStyle=i%2===0?'#ff5555':'#5588ff';ctx.beginPath();ctx.arc(cx+nucR*.52*Math.cos(a),cy+nucR*.52*Math.sin(a),1.9,0,Math.PI*2);ctx.fill();}
      const fs=sym.length>2?9:sym.length===2?11:13;
      ctx.font=`bold ${fs}px monospace`; ctx.fillStyle='white'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(sym,cx,cy);
      rafRef.current=requestAnimationFrame(frame);
    }
    rafRef.current=requestAnimationFrame(frame);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);last=null;};
  },[num]);

  return <canvas ref={ref} style={{display:'block',borderRadius:'8px',margin:'0 auto'}} />;
}

// ── Cell ─────────────────────────────────────────
function Cell({ el, onClick, colorMode, cw=43, ch=52 }) {
  const [n,sym,,cat,,mass] = el;
  const baseColor = CATS[cat].c;
  const baseBg    = CATS[cat].b;
  let cellColor = baseColor, cellBg = baseBg;
  if (colorMode === 'en') {
    cellColor = enColor(EN_DATA[n]);
    cellBg = cellColor + '14';
  } else if (colorMode === 'cosmic') {
    const oi = ORIGIN[n];
    cellColor = ORIGIN_INFO[oi].c;
    cellBg = cellColor + '18';
  }
  const massStr = mass>=100 ? mass.toFixed(1) : mass.toFixed(2);
  const state = STATES[n];
  const isSyn = SYNTHETIC.has(n);
  return (
    <div className="ecell" onClick={()=>onClick(el)}
      style={{width:cw,height:ch,background:cellBg,'--cc':cellColor,
        borderStyle:state==='gas'?'dashed':state==='liquid'?'solid':'solid',
        borderWidth:state==='liquid'?2:1,
        position:'relative'}}>
      <span className="enum">{n}</span>
      <span className="esym" style={{color:cellColor}}>{sym}</span>
      <span className="emass">{massStr}</span>
      {isSyn && <span style={{position:'absolute',top:1,right:2,fontSize:6,opacity:.55,color:cellColor}}>⚗</span>}
      {state==='liquid' && <span style={{position:'absolute',bottom:1,right:2,fontSize:5,color:'#34d399'}}>liq</span>}
      {state==='gas' && <span style={{position:'absolute',bottom:1,right:2,fontSize:5,color:'#60a5fa'}}>gas</span>}
    </div>
  );
}


// ── Nav helpers ───────────────────────────────────
function navAxisLabel(el, dir, view) {
  const [, , , , , , trow, tcol] = el;
  if (view === 'janet') {
    const p = JANET_POS[el[0]];
    if (!p) return '';
    if (dir === 'left' || dir === 'right') {
      const col = p[1];
      const blk = col<=14?'f-block':col<=24?'d-block':col<=30?'p-block':'s-block';
      return `Janet row ${p[0]} · ${blk}`;
    }
    const col = p[1];
    const blk = col<=14?'f-block':col<=24?'d-block':col<=30?'p-block':'s-block';
    return `Janet col ${p[1]} · ${blk}`;
  }
  // Standard / Dufour use standard positions
  if (dir === 'up' || dir === 'down') {
    const gNum = tcol;
    const gLabel = gNum <= 2 ? `Group ${gNum}` : gNum >= 13 ? `Group ${gNum}` : `Group ${gNum} (transition)`;
    return `same group · ${gLabel}`;
  }
  const period = trow > 7 ? (trow === 8 ? 6 : 7) : trow;
  return `same period · Period ${period}`;
}

// ── NavCompass ────────────────────────────────────
function NavCompass({ el, view, onNavigate }) {
  const [, sym, , cat, , , trow, tcol] = el;
  const color = CATS[cat].c;

  const DIRS = [
    { d: 'up',    arrow: '↑', ga: 'up'    },
    { d: 'left',  arrow: '←', ga: 'left'  },
    { d: 'right', arrow: '→', ga: 'right' },
    { d: 'down',  arrow: '↓', ga: 'down'  },
  ];

  const neighbors = {};
  DIRS.forEach(({ d }) => { neighbors[d] = getNeighbor(el, d, view); });

  const btnStyle = (nc) => ({
    border: `1px solid ${nc}55`,
    color: nc,
    background: nc + '0e',
    borderRadius: 6,
    cursor: 'pointer',
    fontFamily: 'monospace',
    padding: '4px 7px',
    transition: 'opacity .1s, background .1s',
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    gap: 2,
    minWidth: 58,
  });

  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '1fr auto 1fr',
      gridTemplateRows: 'auto auto auto',
      gap: 4,
      marginBottom: 12,
    }}>
      {/* Row 1: up arrow (center) */}
      <div />
      {neighbors.up ? (
        <button style={btnStyle(CATS[neighbors.up[3]].c)} onClick={() => onNavigate(neighbors.up)}>
          <span style={{ fontSize: 11, fontWeight: 'bold' }}>
            ↑ {neighbors.up[1]}
          </span>
          <span style={{ fontSize: 7, opacity: .5, letterSpacing: '.03em', textAlign: 'center' }}>
            {navAxisLabel(el, 'up', view)}
          </span>
        </button>
      ) : <div />}
      <div />

      {/* Row 2: left / current / right */}
      {neighbors.left ? (
        <button style={{ ...btnStyle(CATS[neighbors.left[3]].c), textAlign: 'right' }} onClick={() => onNavigate(neighbors.left)}>
          <span style={{ fontSize: 11, fontWeight: 'bold' }}>← {neighbors.left[1]}</span>
          <span style={{ fontSize: 7, opacity: .5, letterSpacing: '.03em' }}>
            {navAxisLabel(el, 'left', view)}
          </span>
        </button>
      ) : <div />}

      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '4px 10px',
        background: color + '14',
        border: `1px solid ${color}44`,
        borderRadius: 6,
        fontSize: 13,
        color: color,
        fontWeight: 'bold',
        fontFamily: 'monospace',
      }}>
        {sym}
      </div>

      {neighbors.right ? (
        <button style={{ ...btnStyle(CATS[neighbors.right[3]].c), textAlign: 'left' }} onClick={() => onNavigate(neighbors.right)}>
          <span style={{ fontSize: 11, fontWeight: 'bold' }}>{neighbors.right[1]} →</span>
          <span style={{ fontSize: 7, opacity: .5, letterSpacing: '.03em' }}>
            {navAxisLabel(el, 'right', view)}
          </span>
        </button>
      ) : <div />}

      {/* Row 3: down arrow (center) */}
      <div />
      {neighbors.down ? (
        <button style={btnStyle(CATS[neighbors.down[3]].c)} onClick={() => onNavigate(neighbors.down)}>
          <span style={{ fontSize: 11, fontWeight: 'bold' }}>
            {neighbors.down[1]} ↓
          </span>
          <span style={{ fontSize: 7, opacity: .5, letterSpacing: '.03em', textAlign: 'center' }}>
            {navAxisLabel(el, 'down', view)}
          </span>
        </button>
      ) : <div />}
      <div />
    </div>
  );
}

// ── Modal ─────────────────────────────────────────
function Modal({ el, onClose, onNavigate, view }) {
  const [num, sym, name, cat, shells, mass, trow, tcol] = el;
  const { c, l } = CATS[cat];
  const ed = EDATA[num] || {};
  const actShells = shells.filter(s => s > 0);
  const valence = actShells[actShells.length - 1];
  const neutrons = Math.round(mass) - num;
  const period = trow > 7 ? (trow === 8 ? 6 : 7) : trow;
  const group = trow <= 7 ? tcol : 'f-block';
  const rc = RARITY_COLORS[ed.rarity] || '#888';
  const state = STATES[num];
  const sm = STATE_META[state];
  const isSyn = SYNTHETIC.has(num);
  const enVal = EN_DATA[num];
  const enHex = enColor(enVal);
  const origIdx = ORIGIN[num];
  const origInfo = ORIGIN_INFO[origIdx];

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="close-btn" onClick={onClose} style={{ color: c }}>✕</button>

        {/* Navigation compass */}
        <NavCompass el={el} view={view} onNavigate={onNavigate} />

        {/* Header */}
        <div className="modal-hdr">
          <div className="modal-numbox" style={{ borderColor: c + '60', color: c + '99' }}>{num}</div>
          <div className="modal-sym-lg" style={{ color: c }}>{sym}</div>
          <div style={{ flex: 1 }}>
            <div className="modal-name">{name}</div>
            <div className="modal-cat" style={{ color: c + 'cc' }}>{l}</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 5 }}>
              {ed.rarity && <span className="badge" style={{ background: rc + '1a', borderColor: rc + '55', color: rc }}>◈ {ed.rarity}</span>}
              {sm && <span className="badge" style={{ background: sm.c + '1a', borderColor: sm.c + '55', color: sm.c }}>{sm.icon} {sm.label}</span>}
              {isSyn && <span className="badge" style={{ background: '#a78bfa1a', borderColor: '#a78bfa55', color: '#a78bfa' }}>⚗ Lab-synthesized</span>}
              <span className="badge" style={{ background: origInfo.c + '1a', borderColor: origInfo.c + '55', color: origInfo.c }}>✦ {origInfo.l}</span>
            </div>
          </div>
        </div>

        {/* Description */}
        {ed.desc && <div className="elem-desc">{ed.desc}</div>}

        {/* Bohr model */}
        <BohrCanvas el={el} />

        {/* Bohr explainer */}
        <div className="bohr-explainer">
          <div className="bohr-explainer-title" style={{ color: c }}>↑ Bohr Atomic Model</div>
          <div className="bohr-row">
            <span className="bohr-key">Nucleus</span>
            <span className="bohr-val">Center sphere — contains <strong style={{ color: '#ff5555' }}>{num} proton{num !== 1 ? 's' : ''}</strong> (+) and ~<strong style={{ color: '#5588ff' }}>{neutrons} neutron{neutrons !== 1 ? 's' : ''}</strong> (neutral). Protons determine the element's identity.</span>
          </div>
          <div className="bohr-row">
            <span className="bohr-key">Shells</span>
            <span className="bohr-val">{num} electron{num !== 1 ? 's' : ''} (−) orbit in {actShells.length} shell{actShells.length !== 1 ? 's' : ''}: {actShells.map((cnt, i) => `${SHL[i]}(${cnt})`).join(' → ')}. Inner shells fill first.</span>
          </div>
          <div className="bohr-row">
            <span className="bohr-key">Valence</span>
            <span className="bohr-val">Outermost <strong style={{ color: c }}>{SHL[actShells.length - 1]}-shell has {valence} electron{valence !== 1 ? 's' : ''}</strong> — these drive all chemical bonding and reactivity.</span>
          </div>
          <div className="bohr-row">
            <span className="bohr-key">Note</span>
            <span className="bohr-val" style={{ opacity: .5 }}>The Bohr model is a classical simplification. Real electrons exist as quantum probability clouds (orbitals), not fixed circular orbits.</span>
          </div>
        </div>

        {/* Stats */}
        <div className="info-grid">
          {[
            ['Atomic Mass', `${mass} u`],
            ['Protons', num],
            ['Neutrons', `~${neutrons}`],
            ['Electrons', num],
            ['Period', period],
            ['Group', group],
            ['Electronegativity', enVal != null ? `${enVal} (Pauling)` : 'N/A'],
            ['Oxidation States', getOxStates(num)],
            ['Valence e⁻', valence],
          ].map(([k, v]) => (
            <div key={k} className="info-item">
              <span className="info-k">{k}</span>
              <span className="info-v" style={{ color: c, fontSize: String(v).length > 10 ? 10 : 13 }}>{v}</span>
            </div>
          ))}
        </div>

        {/* EN bar */}
        {enVal != null && (
          <div style={{ margin: '11px 0' }}>
            <div className="sec-hdr" style={{ color: c + '66' }}>ELECTRONEGATIVITY (PAULING SCALE)</div>
            <div style={{ height: 6, background: 'rgba(255,255,255,.06)', borderRadius: 3, position: 'relative', margin: '5px 0 2px' }}>
              <div style={{ width: `${((enVal - 0.7) / (4.0 - 0.7)) * 100}%`, height: '100%', borderRadius: 3, background: `linear-gradient(90deg,#3b82f6,${enHex})` }} />
              <div style={{ position: 'absolute', top: -11, left: `${((enVal - 0.7) / (4.0 - 0.7)) * 100}%`, transform: 'translateX(-50%)' }}>
                <span style={{ fontSize: 9, fontFamily: 'monospace', color: enHex }}>{enVal}</span>
              </div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 8, opacity: .32 }}>
              <span>0.7 (Fr — least)</span><span>3.98 (F — most)</span>
            </div>
          </div>
        )}

        {/* Cosmic origin */}
        <div style={{ margin: '10px 0' }}>
          <div className="sec-hdr" style={{ color: c + '66' }}>COSMIC ORIGIN</div>
          <div style={{ fontSize: 10, lineHeight: 1.6, padding: '7px 10px', background: 'rgba(255,255,255,.025)', borderRadius: 6, borderLeft: `3px solid ${origInfo.c}` }}>
            <span style={{ color: origInfo.c, fontWeight: 'bold' }}>{origInfo.l}</span>
            <span style={{ color: 'rgba(190,210,240,.6)', marginLeft: 8 }}>{origInfo.d}</span>
          </div>
        </div>

        {/* Facts */}
        {ed.facts && ed.facts.length > 0 && (
          <div style={{ margin: '11px 0' }}>
            <div className="sec-hdr" style={{ color: c + '66' }}>NOTABLE FACTS</div>
            {ed.facts.map((f, i) => (
              <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 5 }}>
                <span style={{ color: c, fontSize: 10, flexShrink: 0, marginTop: 2 }}>▸</span>
                <span style={{ fontSize: 11, lineHeight: 1.6, color: 'rgba(190,210,240,.63)' }}>{f}</span>
              </div>
            ))}
          </div>
        )}

        {/* Locations */}
        {ed.loc && (
          <div style={{ margin: '10px 0' }}>
            <div className="sec-hdr" style={{ color: c + '66' }}>WHERE IT'S FOUND</div>
            <div style={{ fontSize: 11, lineHeight: 1.6, color: 'rgba(190,210,240,.58)', padding: '8px 11px', background: 'rgba(255,255,255,.025)', borderRadius: 7, borderLeft: `3px solid ${c}44`, display: 'flex' }}>
              <span style={{ opacity: .4, marginRight: 6 }}>⊕</span>{ed.loc}
            </div>
          </div>
        )}

        {/* Shells */}
        <div style={{ marginTop: 11 }}>
          <div className="sec-hdr" style={{ color: c + '66' }}>ELECTRON CONFIGURATION</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
            {actShells.map((cnt, i) => {
              const isVal = i === actShells.length - 1;
              return (
                <div key={i} style={{
                  border: `1px solid ${isVal ? c : 'rgba(140,170,220,.2)'}`,
                  borderRadius: 5, padding: '4px 7px',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1,
                  background: isVal ? c + '18' : 'rgba(140,170,220,.04)',
                  color: isVal ? c : 'rgba(140,170,220,.48)',
                  fontWeight: isVal ? 'bold' : 'normal',
                }}>
                  <span style={{ fontSize: 7, opacity: .62, fontFamily: 'monospace' }}>{SHL[i]}</span>
                  <span style={{ fontSize: 13, fontWeight: 'bold', fontFamily: 'monospace' }}>{cnt}</span>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize: 10, marginTop: 8, color: c, opacity: .75 }}>
            ⬡ {valence} valence electron{valence !== 1 ? 's' : ''} in {SHL[actShells.length - 1]}-shell
          </div>
        </div>
      </div>
    </div>
  );
}

function getOxStates(n) {
  const OX = { 1:'+1,-1',2:'0',3:'+1',4:'+2',5:'+3,-3',6:'+4,-4',7:'+5,+3,-3',8:'-2',9:'-1',10:'0',11:'+1',12:'+2',13:'+3',14:'+4,-4',15:'+5,+3,-3',16:'+6,+4,-2',17:'+7,-1',18:'0',19:'+1',20:'+2',21:'+3',22:'+4,+3,+2',23:'+5,+4,+3',24:'+6,+3,+2',25:'+7,+4,+2',26:'+3,+2',27:'+3,+2',28:'+2',29:'+2,+1',30:'+2',31:'+3',32:'+4,+2',33:'+5,+3,-3',34:'+6,-2',35:'+5,-1',36:'0',37:'+1',38:'+2',39:'+3',40:'+4',41:'+5,+3',42:'+6,+4,+2',43:'+7,+4',44:'+4,+3',45:'+3',46:'+4,+2',47:'+1',48:'+2',49:'+3',50:'+4,+2',51:'+5,+3,-3',52:'+6,-2',53:'+7,-1',54:'0',55:'+1',56:'+2',79:'+3,+1',80:'+2,+1',82:'+4,+2',83:'+3',92:'+6,+4',94:'+4,+3' };
  return OX[n] || (n > 86 ? '+3,+4' : 'various');
}

// ── PeriodicTable ─────────────────────────────────
function PeriodicTable() {
  const [sel, setSel] = useState(null);
  const [view, setView] = useState('standard');
  const [colorMode, setColorMode] = useState('category');

  const CW_STD = 43, CH_STD = 52;
  const CW_JAN = 31, CH_JAN = 44;

  const mainEls = EL.filter(e => e[6] <= 7);
  const lantEls = EL.filter(e => e[6] === 8);
  const actEls  = EL.filter(e => e[6] === 9);

  const VIEW_TABS  = [{ id:'standard', l:'Standard (IUPAC)' }, { id:'janet', l:'Janet / Left-Step' }, { id:'dufour', l:'Dufour Spiral' }];
  const COLOR_TABS = [{ id:'category', l:'Category' }, { id:'cosmic', l:'Cosmic Origin' }, { id:'en', l:'Electronegativity' }];

  function getDufourPos(el, W, H) {
    const [,,,, shells] = el;
    const act = shells.filter(c => c > 0);
    const period = act.length;
    const valence = act[act.length - 1];
    const a = (valence / 8) * 2 * Math.PI - Math.PI / 2;
    const r = 28 + period * 62;
    return { x: W/2 + r * Math.cos(a), y: H/2 + r * Math.sin(a) };
  }

  const CSS = `
    * { box-sizing: border-box; }
    .ecell { border:1px solid var(--cc,#334); border-radius:4px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; position:relative;
      transition:transform .12s,box-shadow .12s,border-color .12s; }
    .ecell:hover { transform:scale(1.22); z-index:10;
      box-shadow:0 0 14px var(--cc,#38bdf8); border-color:var(--cc,#38bdf8); }
    .enum  { font-size:7px; opacity:.4; line-height:1; margin-top:2px; }
    .esym  { font-size:15px; font-weight:bold; line-height:1.1; }
    .emass { font-size:6px; opacity:.35; line-height:1; margin-bottom:2px; }
    .overlay { position:fixed; inset:0; z-index:100; background:rgba(2,8,16,.88);
      backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center;
      animation:fadeIn .15s ease; }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    .modal { background:#060e1c; border:1px solid rgba(100,140,200,.22);
      border-radius:14px; padding:20px; max-width:420px; width:94vw;
      animation:popIn .18s cubic-bezier(.34,1.56,.64,1);
      max-height:90vh; overflow-y:auto; position:relative;
      scrollbar-width:thin; scrollbar-color:rgba(100,140,200,.15) transparent; }
    @keyframes popIn { from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1} }
    .close-btn { position:absolute; top:10px; right:12px; background:none; border:none;
      font-size:18px; cursor:pointer; opacity:.6; padding:4px 8px; font-family:monospace; }
    .close-btn:hover { opacity:1; }
    .modal-hdr { display:flex; align-items:flex-start; gap:12px; margin-bottom:11px; }
    .modal-numbox { font-size:10px; border:1px solid; border-radius:4px; padding:2px 5px;
      min-width:26px; text-align:center; flex-shrink:0; margin-top:4px; font-family:monospace; }
    .modal-sym-lg { font-size:40px; font-weight:bold; line-height:1; flex-shrink:0; font-family:monospace; }
    .modal-name { font-size:15px; font-weight:bold; color:#dde6f5; }
    .modal-cat { font-size:10px; letter-spacing:.05em; margin-top:1px; }
    .badge { display:inline-block; font-size:9px; letter-spacing:.06em;
      border:1px solid; border-radius:10px; padding:2px 7px; font-family:monospace; }
    .elem-desc { font-size:11px; line-height:1.7; color:rgba(190,210,240,.68);
      margin-bottom:11px; padding:9px 11px; background:rgba(255,255,255,.025);
      border-radius:7px; border-left:2px solid rgba(100,140,200,.18); }
    .bohr-explainer { background:rgba(255,255,255,.02); border-radius:7px; padding:9px 11px;
      margin:10px 0; border:1px solid rgba(100,140,200,.1); }
    .bohr-explainer-title { font-size:9px; letter-spacing:.1em; margin-bottom:7px; font-family:monospace; }
    .bohr-row { display:flex; gap:8px; margin-bottom:5px; align-items:flex-start; }
    .bohr-key { font-size:8px; min-width:52px; opacity:.4; flex-shrink:0; padding-top:1px;
      font-family:monospace; letter-spacing:.04em; }
    .bohr-val { font-size:10px; line-height:1.55; color:rgba(190,210,240,.65); }
    .info-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin:11px 0; }
    .info-item { background:rgba(255,255,255,.04); border-radius:5px; padding:6px 8px;
      display:flex; flex-direction:column; gap:2px; }
    .info-k { font-size:7px; opacity:.3; letter-spacing:.05em; }
    .info-v { font-weight:bold; font-family:monospace; }
    .sec-hdr { font-size:8px; letter-spacing:.14em; margin-bottom:6px; font-family:monospace; }
    .placeholder { border:1px dashed rgba(140,170,220,.14); border-radius:4px; font-size:7px;
      display:flex; align-items:center; justify-content:center;
      color:rgba(140,170,220,.22); font-family:monospace; }
    .tab-btn { background:rgba(255,255,255,.04); border:1px solid rgba(140,170,220,.15);
      border-radius:5px; color:rgba(190,210,240,.5); cursor:pointer; font-family:monospace;
      font-size:9px; padding:4px 10px; letter-spacing:.04em; transition:.1s; }
    .tab-btn:hover { opacity:.8; }
    .tab-btn.active { border-color:currentColor; color:#dde6f5; background:rgba(255,255,255,.08); }
    .dufour-node { position:absolute; display:flex; align-items:center; justify-content:center;
      border-radius:50%; cursor:pointer; font-family:monospace; transition:.15s; }

  return (

      <style>{CSS}</style>

      <div style={{ fontSize:13, letterSpacing:'.18em', opacity:.4, marginBottom:2 }}>⬡ PERIODIC TABLE OF THE ELEMENTS</div>
      <div style={{ fontSize:8, opacity:.18, letterSpacing:'.08em', marginBottom:10 }}>118 ELEMENTS · BOHR MODEL · FACTS · RARITY · LOCATION · NAVIGATION</div>

      {/* Controls */}
      <div style={{ display:'flex', gap:16, flexWrap:'wrap', marginBottom:10, alignItems:'flex-start' }}>
        <div>
          <div style={{ fontSize:7, opacity:.28, letterSpacing:'.1em', marginBottom:4 }}>TABLE LAYOUT</div>
          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
            {VIEW_TABS.map(t => (
              <button key={t.id} className={`tab-btn ${view===t.id?'active':''}`}
                style={{ color: view===t.id?'#38bdf8':undefined }} onClick={()=>setView(t.id)}>{t.l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:7, opacity:.28, letterSpacing:'.1em', marginBottom:4 }}>COLOR CODING</div>
          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
            {COLOR_TABS.map(t => (
              <button key={t.id} className={`tab-btn ${colorMode===t.id?'active':''}`}
                style={{ color: colorMode===t.id?'#f97316':undefined }} onClick={()=>setColorMode(t.id)}>{t.l}</button>
            ))}

      {/* ── STANDARD ── */}
      {view === 'standard' && (
        <>
          <div style={{ position:'relative', width:18*(CW_STD+2)+'px', height:7*(CH_STD+2)+'px' }}>
            {mainEls.map(e => (
              <div key={e[0]} style={{ position:'absolute', left:(e[7]-1)*(CW_STD+2)+'px', top:(e[6]-1)*(CH_STD+2)+'px' }}>
                <Cell el={e} onClick={setSel} colorMode={colorMode} cw={CW_STD} ch={CH_STD} />

            <div style={{ position:'absolute', left:2*(CW_STD+2)+'px', top:5*(CH_STD+2)+'px' }}>
              <div className="placeholder" style={{ width:CW_STD, height:CH_STD }}>57–71</div>
            </div>
            <div style={{ position:'absolute', left:2*(CW_STD+2)+'px', top:6*(CH_STD+2)+'px' }}>
              <div className="placeholder" style={{ width:CW_STD, height:CH_STD }}>89–103</div>
            </div>
          </div>
          <div style={{ marginTop:12 }}>
            <div style={{ fontSize:7, opacity:.2, letterSpacing:'.08em', marginBottom:2, paddingLeft:2*(CW_STD+2)+'px' }}>LANTHANIDES (f-block, period 6)</div>
            <div style={{ display:'flex', gap:2, paddingLeft:2*(CW_STD+2)+'px' }}>
              {lantEls.map(e => <Cell key={e[0]} el={e} onClick={setSel} colorMode={colorMode} cw={CW_STD} ch={CH_STD} />)}
            </div>
          </div>
          <div style={{ marginTop:2 }}>
            <div style={{ fontSize:7, opacity:.2, letterSpacing:'.08em', marginBottom:2, paddingLeft:2*(CW_STD+2)+'px' }}>ACTINIDES (f-block, period 7)</div>
            <div style={{ display:'flex', gap:2, paddingLeft:2*(CW_STD+2)+'px' }}>
              {actEls.map(e => <Cell key={e[0]} el={e} onClick={setSel} colorMode={colorMode} cw={CW_STD} ch={CH_STD} />)}
            </div>

        </>

            <strong style={{ opacity:.7 }}>Janet Left-Step Table (1928):</strong> f→d→p→s reading left to right. Each row ends with the alkaline earth (s²). Helium placed in Group 2 by electron configuration. All 118 elements appear inline — no f-block pullout. Navigate with ←→↑↓ in any element view.

              const p = JANET_POS[e[0]]; if (!p) return null;
              return (
                <div key={e[0]} style={{ position:'absolute', left:(p[1]-1)*(CW_JAN+1)+'px', top:(p[0]-1)*(CH_JAN+1)+'px' }}>
