  90: { desc:"A weakly radioactive, silvery metal with energy potential exceeding uranium. Thorium is the most abundant radioactive element in Earth's crust ŌĆö about three times more abundant than uranium.", facts:["India holds one-third of the world's thorium reserves and is building thorium molten salt reactors for energy independence","The incandescent gas mantles in camping lanterns are made of thorium oxide ŌĆö the most thermally stable oxide known","Thorium-228 was used as a cancer treatment in the 1950s ŌĆö with disastrous long-term outcomes not understood at the time"], rarity:"Uncommon", loc:"India (monazite beach sands of Kerala and Tamil Nadu), Brazil, Australia, USA ŌĆö monazite placer deposits" },
  91: { desc:"A dense, toxic, and intensely radioactive metal. Protactinium-231 decays to actinium ŌĆö hence the name. It exists only in uranium ores and is one of the most difficult elements to work with safely.", facts:["The entire world stock of protactinium-231 is about 125 grams, held at the UK's Atomic Energy Authority in Harwell","Protactinium/thorium ratios in ocean sediments are used to reconstruct past ocean circulation patterns","Processing protactinium in bulk requires a nuclear facility ŌĆö it is so radioactive that normal chemistry is essentially impossible"], rarity:"Very Rare", loc:"Trace in uranium ores worldwide; UK (Harwell ŌĆö world's largest stock, concentrated from nuclear processing)" },
  92: { desc:"The heaviest naturally occurring element. Uranium's discovery of fission in 1938 changed history. It is both the fuel for 10% of global electricity and the material for nuclear weapons.", facts:["Uranium glass (Vaseline glass) glows brilliant green under UV light and was fashionable in Victorian tableware ŌĆö it is only mildly radioactive","The Oklo deposit in Gabon had a natural nuclear reactor operating 1.7 billion years ago","The Athabasca Basin in Saskatchewan, Canada contains uranium ore grades up to 20% ŌĆö the world's richest deposits"], rarity:"Uncommon", loc:"Kazakhstan (world leader ŌĆö 40%), Canada (Athabasca Basin), Australia, Namibia, Niger, Russia ŌĆö uraninite/pitchblende" },
  93: { desc:"The first transuranic element ŌĆö beyond uranium in the periodic table. Neptunium was discovered in 1940 by bombarding uranium with neutrons. Named after the next planet beyond Uranus.", facts:["Neptunium-237 has a half-life of 2.14 million years ŌĆö it accumulates as a byproduct in spent nuclear fuel","Tiny amounts of neptunium occur naturally in uranium ores as a decay product of uranium-238","Neptunium was produced by the first nuclear reactor (Chicago Pile-1) in 1942 as an impurity in plutonium production"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide; trace amounts in uranium ores (about 10 parts per billion in pitchblende)" },
  94: { desc:"Perhaps the most consequential element ever synthesized. Plutonium powers nuclear weapons and deep-space probes ŌĆö the New Horizons spacecraft that flew past Pluto was powered by plutonium.", facts:["The bomb dropped on Nagasaki contained only 6.2 kg of plutonium ŌĆö most of which fissioned in about one microsecond","Plutonium-238 is used in radioisotope thermoelectric generators ŌĆö the Voyager probes still send signals powered by Pu-238 launched in 1977","Plutonium metal has 6 allotropic phases ŌĆö causing density differences of 25% between forms"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide; trace amounts in uranium ores (less than 1 part per trillion)" },
  95: { desc:"A silvery radioactive metal. Americium-241 is the most commercially distributed radioactive isotope in the world ŌĆö it is in the ionization chamber of virtually every smoke detector.", facts:["About 0.3 micrograms of americium-241 in a smoke detector alpha-ionizes air ŌĆö smoke disrupts the ion current triggering the alarm","Americium was secretly produced during the Manhattan Project and declassified in 1945","Americium-241 is recovered from aged plutonium in nuclear weapons stockpiles ŌĆö Pu-241 decays into Am-241 over decades"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide from plutonium; also recovered from nuclear weapons components" },
  96: { desc:"Named after the Curies ŌĆö Pierre and Marie ŌĆö the only couple to have an element named in their honor. Curium is intensely radioactive and thermally hot ŌĆö it glows red in the dark from its own heat.", facts:["A few grams of curium-244 glow cherry-red in the dark from the heat of its own radioactive decay","Curium was secretly synthesized during the Manhattan Project and not announced until after World War II","The Mars rovers used curium-244 X-ray sources in their Alpha Particle X-Ray Spectrometers to analyze Martian rocks"], rarity:"Synthetic", loc:"Produced in nuclear reactors at Oak Ridge (USA), Mayak (Russia), and other nuclear facilities worldwide" },
  97: { desc:"Named after the University of California, Berkeley ŌĆö where it was first synthesized. Berkelium is a radioactive metal produced in milligram quantities ŌĆö the most ever produced is about a gram.", facts:["Berkelium-249 is the primary target material for synthesizing heavier elements ŌĆö including tennessine and oganesson","Synthesis of a visible amount of berkelium takes several months in a high-flux nuclear reactor","Berkelium was first synthesized in 1949 using only a few micrograms of material"], rarity:"Synthetic", loc:"Produced exclusively at Oak Ridge National Laboratory (Tennessee, USA) using the High Flux Isotope Reactor" },
  98: { desc:"Named after California. Californium-252 is the most intense known neutron source ŌĆö a microgram emits 170 million neutrons per second ŌĆö used to start nuclear reactors and detect land mines.", facts:["Californium-252 neutron sources have been used to detect land mines in Bosnia and are used routinely in oil well logging","One microgram of californium-252 costs about $27 million ŌĆö making it one of the most expensive substances on Earth per gram","Californium is produced in such small quantities that its chemistry has largely been studied using single atoms or small clusters"], rarity:"Synthetic", loc:"Produced at Oak Ridge National Laboratory (USA) and the Research Institute of Atomic Reactors (Russia ŌĆö Dimitrovgrad)" },
  99: { desc:"Named after Albert Einstein. Einsteinium was discovered in the debris of the first hydrogen bomb test (Ivy Mike, 1952) ŌĆö classified for years. It is so radioactive that its chemistry is extremely difficult to study.", facts:["Einsteinium was discovered in fallout from the 1952 Ivy Mike hydrogen bomb test at Enewetak Atoll in the Pacific","Only microgram quantities can be produced ŌĆö severe self-irradiation causes crystals to glow visibly in the dark","In 2021, scientists finally characterized einsteinium's chemistry ŌĆö studying just 200 nanograms, less than a speck of dust"], rarity:"Synthetic", loc:"Produced in minute quantities at Oak Ridge (USA) and nuclear facilities in Russia and Europe" },
  100:{ desc:"Named after nuclear physicist Enrico Fermi. Fermium was also discovered in H-bomb fallout ŌĆö it is the heaviest element that can be formed by nuclear reactions in stars (r-process nucleosynthesis).", facts:["Fermium is the heaviest element that can be created by neutron bombardment ŌĆö heavier elements require particle accelerators","Fermium-257 has the longest half-life of any fermium isotope at 100.5 days","Less than a microgram of fermium has ever been produced in total by all the world's nuclear facilities"], rarity:"Synthetic", loc:"Produced in nuclear reactors worldwide, primarily at Oak Ridge National Laboratory (USA)" },
  101:{ desc:"Named after Dmitri Mendeleev ŌĆö the creator of the periodic table. Mendelevium was the first element produced one atom at a time ŌĆö synthesized by bombarding einsteinium with helium ions.", facts:["Only about 1 million atoms of mendelevium-256 were synthesized in the original 1955 experiment","Mendelevium-258 has a half-life of 51.5 days ŌĆö long enough to study its basic chemistry in small quantities","Glenn Seaborg and his team drove through the night to confirm the discovery before announcing it ŌĆö hiding results due to Cold War secrecy"], rarity:"Synthetic", loc:"Produced in particle accelerators ŌĆö LBNL (Berkeley, USA), Oak Ridge, Dubna (Russia)" },
  102:{ desc:"Named after Alfred Nobel, inventor of dynamite and founder of the Nobel Prizes. Nobelium's discovery was disputed between Soviet and American teams during the Cold War ŌĆö and both got it wrong before Sweden confirmed it.", facts:["The Soviet and American teams both initially made errors in claiming the discovery ŌĆö confirmed by the Nobel Institute in Sweden in 1957","The Dubna team in Russia was the first to correctly characterize nobelium's chemistry","Nobelium-259 has a half-life of 58 minutes ŌĆö sufficient to study basic chemical properties"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia), LBNL (Berkeley, USA), and GSI (Darmstadt, Germany)" },
  103:{ desc:"Named after Ernest Lawrence, inventor of the cyclotron. The last actinide element and the last element in the f-block. Lawrencium's synthesis marked the completion of the actinide series.", facts:["Lawrencium-266 has a half-life of about 11 hours ŌĆö among the longest for any lawrencium isotope","Lawrencium has one valence electron outside a filled f-shell ŌĆö making its chemistry resemble the lighter lanthanide lutetium","The discovery was again disputed between American (Berkeley) and Soviet (Dubna) teams during the Cold War"], rarity:"Synthetic", loc:"Produced at LBNL (Berkeley, USA), JINR (Dubna, Russia), and RIKEN (Japan)" },
  104:{ desc:"The first transactinide element and the first in the 6d transition series. Named after Ernest Rutherford, who discovered the atomic nucleus.", facts:["The synthesis of rutherfordium opened the 'superheavy element' era ŌĆö elements so massive their chemistry challenges quantum theory","Rutherfordium was the subject of intense Cold War priority disputes ŌĆö the US named it rutherfordium, the Soviets called it kurchatovium","Relativistic quantum effects make rutherfordium behave like hafnium chemically ŌĆö the first confirmation of relativistic chemistry"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) and LBNL (Berkeley, USA) by bombarding californium-249 or curium with light ions" },
  105:{ desc:"Named after Dubna, Russia, where it was discovered. Dubnium is a transactinide superheavy metal that exists for only seconds. Its chemistry is studied one atom at a time using ingenious microfluidic techniques.", facts:["A single experiment determining dubnium's chemistry may take weeks of reactor time to produce just a few hundred atoms","Dubnium's chemistry mirrors niobium and tantalum as predicted by the periodic table ŌĆö confirming its placement","The element's other proposed name, hahnium (after Otto Hahn), was officially withdrawn in 1997 by IUPAC"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia), GSI (Darmstadt, Germany), and LBNL (Berkeley, USA)" },
  106:{ desc:"Named after Glenn T. Seaborg ŌĆö the only person to have a chemical element named after them while still alive. Seaborgium's chemistry was studied in 1997 with just seven atoms, confirming it behaves like tungsten.", facts:["Glenn Seaborg co-discovered 10 transuranic elements ŌĆö more than any other scientist in history","A 1997 experiment studied seaborgium's chemistry using 7 atoms over 3 weeks, comparing behavior to molybdenum and tungsten","Seaborgium's longest-lived isotope has a half-life of 14 minutes ŌĆö extremely short for chemistry experiments"], rarity:"Synthetic", loc:"Produced at LBNL (Berkeley, USA), GSI (Darmstadt, Germany), and FLNR (Dubna, Russia)" },
  107:{ desc:"Named after Niels Bohr, father of quantum atomic theory. Bohrium was first synthesized in 1981 and exists for only seconds. Its chemical behavior has been inferred but not directly studied.", facts:["Bohrium-270 has a half-life of only 61 seconds ŌĆö the longest known for any bohrium isotope","The synthesis of one atom of bohrium takes bombarding billions of bismuth nuclei with chromium ions","Bohrium is predicted to behave like rhenium ŌĆö sitting directly below it in Group 7 of the periodic table"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany), JINR (Dubna, Russia), and RIKEN (Japan)" },
  108:{ desc:"Named after Hesse (Hassia in Latin), the German state containing Darmstadt's GSI laboratory. Hassium is one of the few superheavy elements whose chemistry has been experimentally studied.", facts:["In 2002, hassium's chemistry was studied using just 6 atoms ŌĆö confirming it forms a volatile tetroxide like osmium","Hassium tetroxide was the first compound of a superheavy element studied using gas chromatography","Hassium-269 has a half-life of about 16 seconds ŌĆö long enough for rudimentary chemical experiments"], rarity:"Synthetic", loc:"Produced exclusively at GSI (Darmstadt, Germany) by bombarding lead-208 with iron-58" },
  109:{ desc:"Named after physicist Lise Meitner, who discovered nuclear fission alongside Otto Hahn but was controversially excluded from the Nobel Prize. Meitnerium exists for only milliseconds.", facts:["Lise Meitner was nominated for the Nobel Prize 48 times without winning ŌĆö meitnerium helps correct this historical injustice","Meitnerium-278 has a half-life of about 7.6 seconds ŌĆö the longest known isotope","Meitnerium's chemistry has never been studied ŌĆö it decays too rapidly for any chemical investigation"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany) using heavy ion bombardment of bismuth targets" },
  110:{ desc:"Named after Darmstadt, Germany ŌĆö where it was first synthesized in 1994. Darmstadtium exists for milliseconds and no chemical properties have been measured ŌĆö only predicted from relativistic quantum calculations.", facts:["Darmstadtium-281 has a half-life of about 12.7 seconds ŌĆö the longest known","Theoretical calculations suggest darmstadtium should be a noble metal similar to platinum, sitting below it in the table","Darmstadtium was produced in a pioneering experiment that created only a few atoms over several weeks"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany), RIKEN (Japan), and JINR (Dubna, Russia)" },
  111:{ desc:"Named after Wilhelm Rontgen, discoverer of X-rays. Roentgenium was first synthesized in 1994 at GSI Darmstadt. Its chemistry is entirely theoretical ŌĆö only a few atoms have ever been created.", facts:["Wilhelm Rontgen was the first Nobel laureate in physics (1901) for discovering X-rays in 1895","Roentgenium-282 has a half-life of about 100 seconds ŌĆö enough for future chemical study in principle","Relativistic effects in roentgenium are so strong its 6d electrons begin to behave like core electrons"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany) and confirmed at RIKEN (Japan) and JINR (Dubna, Russia)" },
  112:{ desc:"Named after Nicolaus Copernicus. Copernicium was created in 1996. Relativistic effects are so extreme that copernicium is predicted to be a gas or volatile liquid at room temperature.", facts:["Copernicium is predicted to behave like a noble gas due to extreme relativistic stabilization of its 7s electrons","Copernicium-285 has a half-life of 29 seconds ŌĆö the longest known for any copernicium isotope","The name was accepted by IUPAC on Copernicus' 537th birthday, February 19, 2010"], rarity:"Synthetic", loc:"Produced at GSI (Darmstadt, Germany); synthesis confirmed at RIKEN (Japan) and FLNR (Dubna, Russia)" },
  113:{ desc:"Named after Japan (Nihon). Nihonium is the first element discovered in Asia and the first to be named by an Asian research institution. The RIKEN team spent 9 years making just 3 atoms.", facts:["RIKEN's synthesis was confirmed after bombarding zinc-70 onto bismuth-209 for 553 days spread over 9 years","Japan received IUPAC naming rights in 2016 ŌĆö the first Asian country to discover and name a chemical element","Nihonium-286 has a half-life of about 9.5 seconds ŌĆö decay chains are used to confirm synthesis"], rarity:"Synthetic", loc:"Discovered and produced at RIKEN (Wako, Saitama, Japan)" },
  114:{ desc:"Named after the Flerov Laboratory of Nuclear Reactions in Dubna, Russia ŌĆö where it was synthesized. Flerovium is predicted to be an extremely dense, short-lived metal with anomalous relativistic behavior.", facts:["Flerovium was first synthesized in 1999 in a collaboration between Dubna and Lawrence Livermore National Laboratory","The 'island of stability' theory predicts nuclei near Z=114, N=184 might have longer half-lives ŌĆö flerovium isotopes are approaching this region","Flerovium-289 has a half-life of about 2.6 seconds ŌĆö short, but enough to study in future experiments"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Lawrence Livermore National Laboratory (USA)" },
  115:{ desc:"Named after Moscow Oblast, Russia. Moscovium was first synthesized in 2003. It sits below bismuth in the periodic table and is predicted to be a semi-metallic solid with limited stability.", facts:["Moscovium was briefly the subject of a conspiracy theory claiming it was the element responsible for UFO propulsion systems ŌĆö completely unfounded","Moscovium-290 has a half-life of about 0.65 seconds ŌĆö one of the shortest for elements with confirmed chemistry predictions","The synthesis uses calcium-48 ions bombarding americium-243 targets"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Oak Ridge National Laboratory (USA)" },
  116:{ desc:"Named after Lawrence Livermore National Laboratory in Livermore, California. Livermorium sits below polonium in the periodic table ŌĆö and like polonium is expected to be a solid metal, but with a half-life of milliseconds.", facts:["Livermorium was first synthesized in 2000 in a Dubna-Livermore collaboration that has produced many of the heaviest elements","The synthesis requires curium-248 targets irradiated with calcium-48 ions ŌĆö a single experiment can take months","Livermorium-293 has a half-life of about 60 milliseconds ŌĆö among the more stable superheavy isotopes"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) in collaboration with Lawrence Livermore National Laboratory (USA)" },
  117:{ desc:"Named after Tennessee, home of Oak Ridge National Laboratory ŌĆö which provided the crucial californium-249 and berkelium-249 targets. Tennessine sits below astatine and is the second heaviest halogen.", facts:["Tennessine required berkelium targets that took 250 days to produce at Oak Ridge's High Flux Isotope Reactor","The synthesis was confirmed in 2010 in a joint Russia-USA experiment at JINR Dubna","Tennessine-294 has a half-life of 51 milliseconds ŌĆö longer than predicted, offering a hint of the 'island of stability'"], rarity:"Synthetic", loc:"Produced at JINR (Dubna, Russia) using targets from Oak Ridge National Laboratory and Vanderbilt University (USA)" },
  118:{ desc:"The heaviest element ever confirmed. Named after Yuri Oganessian, the world's leading superheavy element physicist ŌĆö the first living person honored with an element name (alongside Seaborg). Only 5 atoms have ever been created.", facts:["Oganesson is the only synthetic noble gas ŌĆö but relativistic effects are so strong it is predicted to be a solid at room temperature","The 5 confirmed atoms of oganesson decay in under 1 millisecond ŌĆö chemistry is currently impossible","Oganesson has the highest atomic number and mass of any confirmed element ŌĆö and likely the highest that will ever be named"], rarity:"Synthetic", loc:"Produced exclusively at JINR (Dubna, Russia) by bombarding californium-249 with calcium-48 ions; only 5 atoms ever created" },
};

function getNeighbor(el, dir, view) {
  let r, c;
  if (view === 'janet') {
    const p = JANET_POS[el[0]]; if(!p) return null;
    [r,c] = p;
  } else { [r,c] = [el[6],el[7]]; }
  const [dr,dc] = dir==='up'?[-1,0]:dir==='down'?[1,0]:dir==='left'?[0,-1]:[0,1];
  return (view==='janet'?JAN_MAP:STD_MAP)[`${r+dr},${c+dc}`] || null;
}

function navAxisLabel(el, dir, view) {
  const [,,,,,, trow, tcol] = el;
  if (view === 'janet') {
    const p = JANET_POS[el[0]]; if(!p) return '';
    const col = p[1];
    const blk = col<=14?'f-block':col<=24?'d-block':col<=30?'p-block':'s-block';
    return (dir==='left'||dir==='right') ? `row ${p[0]} ┬Ę ${blk}` : `col ${p[1]} ┬Ę ${blk}`;
  }
  if (dir==='up'||dir==='down') return `same group ┬Ę G${tcol}`;
  const period = trow>7?(trow===8?6:7):trow;
  return `same period ┬Ę P${period}`;
}

function enColor(en) {
  if (!en) return '#3d3d5c';
  const t = (en-0.7)/(4.0-0.7);
  const r = Math.round(59+t*(239-59));
  const g = Math.round(130+(t<0.5?t*2*(200-130):(1-(t-.5)*2)*(200-68)+68));
  const b = Math.round(246-t*(246-68));
  return `rgb(${r},${g},${b})`;
}

function dispCount(cnt,isVal){return isVal?Math.min(cnt,12):Math.min(cnt,8);}

// ŌöĆŌöĆ BohrCanvas ŌöĆŌöĆ accepts a `sz` prop so modal can embed at smaller size
function BohrCanvas({ el, sz=260 }) {
  const ref = useRef(null);
  const rafRef = useRef(null);
  const stRef = useRef(null);
  const [num,sym,,cat,shells] = el;
  const color = CATS[cat].c;

  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const dpr=window.devicePixelRatio||1;
    canvas.width=sz*dpr; canvas.height=sz*dpr;
    canvas.style.width=sz+'px'; canvas.style.height=sz+'px';
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=sz/2,cy=sz/2;
    const actShells=shells.filter(c=>c>0);
    const nS=actShells.length,vi=nS-1;
    const nucR=Math.max(11,sz*0.055);
    const minR=nucR+sz*0.07,maxR=cx-sz*0.06;
    const radii=actShells.map((_,i)=>nS===1?(minR+maxR)/2:minR+(maxR-minR)*i/(nS-1));
    if(!stRef.current||stRef.current.num!==num){
      stRef.current={num,t:0,
        stars:Array.from({length:40},()=>({x:Math.random()*sz,y:Math.random()*sz,r:Math.random()*.7+.2,a:Math.random()*.45+.12,tw:Math.random()*Math.PI*2})),
        angles:actShells.map((cnt,si)=>{const dc=dispCount(cnt,si===vi);return Array.from({length:dc},(_,ei)=>2*Math.PI*ei/dc+si*.42);}),
      };
    }
    const SPEEDS=[3.2,1.6,.85,.48,.28,.16,.10]; let last=null;
    function frame(ts){
      if(!last)last=ts; const dt=Math.min((ts-last)/1000,.05); last=ts;
      stRef.current.t+=dt; const t=stRef.current.t;
      stRef.current.angles=stRef.current.angles.map((arr,si)=>arr.map(a=>a+SPEEDS[Math.min(si,6)]*dt));
      ctx.fillStyle='#020810'; ctx.fillRect(0,0,sz,sz);
      stRef.current.stars.forEach(s=>{const tw=.4+.6*Math.sin(t*1.5+s.tw);ctx.fillStyle=`rgba(255,255,255,${s.a*tw})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
      for(let si=nS-1;si>=0;si--){
        const cnt=actShells[si],r=radii[si],isVal=si===vi;
        ctx.save(); if(isVal){ctx.shadowBlur=12;ctx.shadowColor=color;}
        ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=isVal?color+'bb':'rgba(140,170,220,0.14)'; ctx.lineWidth=isVal?1.6:.6; ctx.stroke(); ctx.restore();
        const lfs=Math.max(6,sz*.027);
        ctx.font=`${isVal?'bold ':''} ${lfs}px monospace`; ctx.fillStyle=isVal?color:'rgba(140,170,220,.35)'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(`${SHL[si]}:${cnt}`,cx,cy-r-2);
        const dc=dispCount(cnt,isVal);
        stRef.current.angles[si].slice(0,dc).forEach(angle=>{
          const ex=cx+r*Math.cos(angle),ey=cy+r*Math.sin(angle),er=sz*.028;
          if(isVal){const g=ctx.createRadialGradient(ex,ey,0,ex,ey,er*2.8);g.addColorStop(0,'#fff');g.addColorStop(.3,color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ex,ey,er*2.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,er*.7,0,Math.PI*2);ctx.fill();}
          else{ctx.fillStyle=si===0?'rgba(210,230,255,.85)':'rgba(160,190,240,.5)';ctx.beginPath();ctx.arc(ex,ey,si===0?er*.8:er*.6,0,Math.PI*2);ctx.fill();}
        });
        if(!isVal&&cnt>dc){ctx.fillStyle='rgba(140,170,220,.35)';ctx.font=`${Math.max(6,sz*.024)}px monospace`;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(`x${cnt}`,cx+r+3,cy);}
      }
      const pulse=1+.11*Math.sin(t*2.8);
      const ng=ctx.createRadialGradient(cx,cy,0,cx,cy,nucR*2.1*pulse);
      ng.addColorStop(0,'rgba(255,255,255,.95)');ng.addColorStop(.18,color+'ee');ng.addColorStop(.5,color+'44');ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng;ctx.beginPath();ctx.arc(cx,cy,nucR*2.1*pulse,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,nucR,0,Math.PI*2);ctx.fillStyle='#060d1e';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=1.6;ctx.stroke();
      const dots=Math.min(num,7);
      for(let i=0;i<dots;i++){const a=(2*Math.PI*i/dots)+t*.5;ctx.fillStyle=i%2===0?'#ff5555':'#5588ff';ctx.beginPath();ctx.arc(cx+nucR*.52*Math.cos(a),cy+nucR*.52*Math.sin(a),Math.max(1.4,nucR*.14),0,Math.PI*2);ctx.fill();}
      const fs=sym.length>2?Math.max(7,nucR*.55):sym.length===2?Math.max(9,nucR*.7):Math.max(10,nucR*.85);
      ctx.font=`bold ${fs}px monospace`;ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sym,cx,cy);
      rafRef.current=requestAnimationFrame(frame);
    }
    rafRef.current=requestAnimationFrame(frame);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);last=null;};
  },[num,sz]);
  return <canvas ref={ref} style={{display:'block',borderRadius:'8px'}} />;
}

  return (
    <div className="ecell" onClick={()=>onClick(el)}

}


function getOxStates(n){
  const OX={1:'+1,-1',2:'0',3:'+1',4:'+2',5:'+3,-3',6:'+4,-4',7:'+5,+3,-3',8:'-2',9:'-1',10:'0',11:'+1',12:'+2',13:'+3',14:'+4,-4',15:'+5,+3,-3',16:'+6,+4,-2',17:'+7,-1',18:'0',19:'+1',20:'+2',21:'+3',22:'+4,+3,+2',23:'+5,+4,+3',24:'+6,+3,+2',25:'+7,+4,+2',26:'+3,+2',27:'+3,+2',28:'+2',29:'+2,+1',30:'+2',31:'+3',32:'+4,+2',33:'+5,+3,-3',34:'+6,-2',35:'+5,-1',36:'0',37:'+1',38:'+2',39:'+3',40:'+4',41:'+5,+3',42:'+6,+4,+2',43:'+7,+4',44:'+4,+3',45:'+3',46:'+4,+2',47:'+1',48:'+2',49:'+3',50:'+4,+2',51:'+5,+3,-3',52:'+6,-2',53:'+7,-1',54:'0',55:'+1',56:'+2',79:'+3,+1',80:'+2,+1',82:'+4,+2',83:'+3',92:'+6,+4',94:'+4,+3'};
  return OX[n]||(n>86?'+3,+4':'various');
}

          ))}
        </div>
        <div style={{width:1,height:14,background:'rgba(140,170,220,.15)',flexShrink:0}}/>
        <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
          {COLORS.map(t=>(
            <button key={t.id} className={`tab-btn${colorMode===t.id?' active':''}`}
              style={{color:colorMode===t.id?'#f97316':undefined}} onClick={()=>setColorMode(t.id)}>{t.l}</button>
          ))}
        </div>
        <button className="tab-btn" style={{marginLeft:'auto'}} onClick={()=>setLegendOpen(x=>!x)}>
          {legendOpen?'Ō¢▓':'Ō¢╝'} Legend
        </button>
      </div>

      {/* ŌöĆŌöĆ STANDARD TABLE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */}
      {view==='standard'&&(
        <>
          <div style={{position:'relative',width:18*(cw+2)+'px',height:7*(ch+2)+'px'}}>
            {mainEls.map(e=>(
              <div key={e[0]} style={{position:'absolute',left:(e[7]-1)*(cw+2)+'px',top:(e[6]-1)*(ch+2)+'px'}}>
                <Cell el={e} onClick={setSel} colorMode={colorMode} cw={cw} ch={ch}/>
              </div>
            ))}
            <div style={{position:'absolute',left:fblockIndent+'px',top:5*(ch+2)+'px'}}>
              <div className="pholder" style={{width:cw,height:ch}}>57ŌĆō71</div></div>
            <div style={{position:'absolute',left:fblockIndent+'px',top:6*(ch+2)+'px'}}>
              <div className="pholder" style={{width:cw,height:ch}}>89ŌĆō103</div></div>
          </div>
          <div style={{marginTop:8}}>
            <div style={{fontSize:6.5,opacity:.18,letterSpacing:'.08em',marginBottom:2,paddingLeft:fblockIndent+'px'}}>LANTHANIDES</div>
            <div style={{display:'flex',gap:2,paddingLeft:fblockIndent+'px'}}>
              {lantEls.map(e=><Cell key={e[0]} el={e} onClick={setSel} colorMode={colorMode} cw={cw} ch={ch}/>)}
            </div>
          </div>
          <div style={{marginTop:2}}>
            <div style={{fontSize:6.5,opacity:.18,letterSpacing:'.08em',marginBottom:2,paddingLeft:fblockIndent+'px'}}>ACTINIDES</div>
            <div style={{display:'flex',gap:2,paddingLeft:fblockIndent+'px'}}>
              {actEls.map(e=><Cell key={e[0]} el={e} onClick={setSel} colorMode={colorMode} cw={cw} ch={ch}/>)}
            </div>
          </div>
        </>
      )}

      {/* ŌöĆŌöĆ JANET TABLE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */}
      {view==='janet'&&(
        <>
          <div style={{fontSize:8.5,opacity:.28,marginBottom:7,maxWidth:760,lineHeight:1.55}}>
            <strong style={{opacity:.8}}>Janet Left-Step (1928):</strong> fŌåÆdŌåÆpŌåÆs left to right. s-block always rightmost. He in Group 2. All 118 elements inline ŌĆö no f-block pullout.
          </div>
          <div style={{position:'relative',width:32*(cwJ+1)+'px',height:7*(chJ+1)+'px'}}>
            {EL.map(e=>{const p=JANET_POS[e[0]];if(!p)return null;
              return <div key={e[0]} style={{position:'absolute',left:(p[1]-1)*(cwJ+1)+'px',top:(p[0]-1)*(chJ+1)+'px'}}>
                <Cell el={e} onClick={setSel} colorMode={colorMode} cw={cwJ} ch={chJ}/>
              </div>;
            })}
          </div>
          <div style={{display:'flex',gap:16,marginTop:6,fontSize:7.5,opacity:.22,flexWrap:'wrap'}}>
            {[['f-block','cols 1ŌĆō14'],['d-block','cols 15ŌĆō24'],['p-block','cols 25ŌĆō30'],['s-block','cols 31ŌĆō32']].map(([b,c])=>(
              <span key={b}><strong style={{opacity:.7}}>{b}</strong> {c}</span>
            ))}
          </div>
        </>
      )}

      {/* ŌöĆŌöĆ DUFOUR SPIRAL ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */}
      {view==='dufour'&&(
        <>
          <div style={{fontSize:8.5,opacity:.28,marginBottom:7,maxWidth:760,lineHeight:1.55}}>
            <strong style={{opacity:.8}}>Dufour-inspired radial:</strong> Radius = electron shell count. Angle = valence electrons (0 at top = noble gases). Click any element to open full detail.
          </div>
          <div style={{position:'relative',width:'860px',height:'800px'}}>
            {EL.map(e=>{
              const cc=colorMode==='en'?enColor(EN_DATA[e[0]]):colorMode==='cosmic'?ORIGIN_INFO[ORIGIN[e[0]]].c:CATS[e[3]].c;
              const pos=getDufourPos(e,860,800); const sz=25;
              return <div key={e[0]} className="dnode" onClick={()=>setSel(e)}
                style={{left:pos.x-sz/2,top:pos.y-sz/2,width:sz,height:sz,border:`1px solid ${cc}`,background:cc+'14','--cc':cc}}>
                <span style={{fontSize:e[1].length>2?6:e[1].length===2?7:9,color:cc,fontWeight:'bold'}}>{e[1]}</span>
              </div>;
            })}
            <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',fontSize:24,opacity:.1}}>ŌÜø</div>
          </div>
        </>
      )}

      {/* ŌöĆŌöĆ LEGEND (collapsible) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */}
      {legendOpen&&(
        <div style={{marginTop:12,padding:'10px 12px',background:'rgba(255,255,255,.02)',
          borderRadius:8,border:'1px solid rgba(140,170,220,.08)',display:'flex',gap:20,flexWrap:'wrap'}}>
          {colorMode==='category'&&(
            <div>
              <div style={{fontSize:6.5,opacity:.25,letterSpacing:'.08em',marginBottom:5}}>ELEMENT CATEGORY</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {Object.entries(CATS).map(([k,{l,c}])=>(
                  <div key={k} style={{display:'flex',alignItems:'center',gap:3,fontSize:7.5,opacity:.5}}>
                    <div style={{width:7,height:7,borderRadius:2,background:c+'33',border:`1px solid ${c}`,flexShrink:0}}/>
                    {l}
                  </div>
                ))}
              </div>
            </div>
          )}
          {colorMode==='cosmic'&&(
            <div>
              <div style={{fontSize:6.5,opacity:.25,letterSpacing:'.08em',marginBottom:5}}>COSMIC ORIGIN</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {ORIGIN_INFO.map(o=>(
                  <div key={o.id} style={{display:'flex',alignItems:'center',gap:3,fontSize:7.5,opacity:.55}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:o.c,flexShrink:0}}/>
                    {o.l}
                  </div>
                ))}
              </div>
            </div>
          )}
          {colorMode==='en'&&(
            <div>
              <div style={{fontSize:6.5,opacity:.25,letterSpacing:'.08em',marginBottom:5}}>ELECTRONEGATIVITY</div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:7.5,opacity:.4}}>Low 0.7 (Fr)</span>
                <div style={{width:130,height:6,borderRadius:3,background:'linear-gradient(90deg,#3b82f6,#84cc16,#ef4444)',opacity:.7}}/>
                <span style={{fontSize:7.5,opacity:.4}}>High 3.98 (F)</span>
              </div>
            </div>
          )}
          <div>
            <div style={{fontSize:6.5,opacity:.25,letterSpacing:'.08em',marginBottom:5}}>RARITY</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {Object.entries(RARITY_COLORS).map(([r,c])=>(
                <div key={r} style={{display:'flex',alignItems:'center',gap:3,fontSize:7.5,opacity:.5}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:c}}/>
                  {r}
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:6.5,opacity:.25,letterSpacing:'.08em',marginBottom:5}}>STATE AT STP</div>
            <div style={{display:'flex',gap:8}}>
              {Object.entries(STATE_META).map(([s,m])=>(
                <div key={s} style={{display:'flex',alignItems:'center',gap:3,fontSize:7.5,opacity:.5,color:m.c}}>
                  {m.icon} {s}
                </div>
              ))}
              <div style={{display:'flex',alignItems:'center',gap:3,fontSize:7.5,opacity:.35}}>
                <span style={{borderBottom:'1px dashed rgba(140,170,220,.5)'}}>dashed</span> = gas
              </div>
            </div>
          </div>
        </div>
      )}

      {sel&&<Modal el={sel} onClose={()=>setSel(null)} onNavigate={e=>setSel(e)} view={view}/>}
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(PeriodicTable));

  </script>
  <script>
    window.addEventListener('load',function(){
      requestAnimationFrame(function(){setTimeout(function(){
        var l=document.getElementById('loading');
        if(l){l.style.opacity='0';setTimeout(function(){l.remove();},400);}
      },80);});
    });
  </script>
