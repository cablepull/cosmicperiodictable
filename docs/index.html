            <div style={{ position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)', fontSize:22, opacity:.12 }}>⚛</div>
          </div>
        </div>
      )}

      {/* Legends */}
      <div style={{ marginTop:14, display:'flex', gap:24, flexWrap:'wrap' }}>
        {colorMode === 'category' && (
          <div>
            <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>ELEMENT CATEGORY</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {Object.entries(CATS).map(([k,{l,c}])=>(
                <div key={k} style={{ display:'flex', alignItems:'center', gap:4, fontSize:8, opacity:.5 }}>
                  <div style={{ width:8, height:8, borderRadius:2, background:c+'33', border:`1px solid ${c}`, flexShrink:0 }} />
                  {l}
                </div>
              ))}
            </div>
          </div>
        )}
        {colorMode === 'cosmic' && (
          <div>
            <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>COSMIC ORIGIN</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {ORIGIN_INFO.map(o => (
                <div key={o.id} style={{ display:'flex', alignItems:'center', gap:4, fontSize:8, opacity:.55 }}>
                  <div style={{ width:8, height:8, borderRadius:'50%', background:o.c, flexShrink:0 }} />
                  {o.l}
                </div>
              ))}
            </div>
          </div>
        )}
        {colorMode === 'en' && (
          <div>
            <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>ELECTRONEGATIVITY (PAULING)</div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontSize:8, opacity:.4 }}>Low 0.7 (Fr)</span>
              <div style={{ width:150, height:7, borderRadius:3, background:'linear-gradient(90deg,#3b82f6,#84cc16,#ef4444)', opacity:.7 }} />
              <span style={{ fontSize:8, opacity:.4 }}>High 3.98 (F)</span>
            </div>
          </div>
        )}
        <div>
          <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>RARITY</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
            {Object.entries(RARITY_COLORS).map(([r,c]) => (
              <div key={r} style={{ display:'flex', alignItems:'center', gap:4, fontSize:8, opacity:.5 }}>
                <div style={{ width:7, height:7, borderRadius:'50%', background:c }} />
                {r}
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>PHYSICAL STATE AT STP</div>
          <div style={{ display:'flex', gap:10 }}>
            {Object.entries(STATE_META).map(([s,m]) => (
              <div key={s} style={{ display:'flex', alignItems:'center', gap:4, fontSize:8, opacity:.5, color:m.c }}>
                {m.icon} {s}
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:7, opacity:.22, letterSpacing:'.08em', marginBottom:5 }}>CELL BORDERS</div>
          <div style={{ display:'flex', gap:10, fontSize:8, opacity:.4 }}>
            <span>solid = solid</span>
            <span style={{ borderBottom:'1px dashed rgba(140,170,220,.5)', paddingBottom:1 }}>dashed = gas</span>
            <span style={{ borderBottom:'2px solid rgba(52,211,153,.5)', paddingBottom:1 }}>thick = liquid</span>
            <span>⚗ = synthetic</span>
          </div>
        </div>
      </div>

      {sel && <Modal el={sel} onClose={()=>setSel(null)} onNavigate={e=>setSel(e)} view={view} />}
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(PeriodicTable));

  </script>

  <script>
    // Hide loader once Babel has compiled and React has mounted
    window.addEventListener('load', function() {
      requestAnimationFrame(function() {
        setTimeout(function() {
          var loader = document.getElementById('loading');
          if (loader) { loader.style.opacity = '0'; setTimeout(function(){ loader.remove(); }, 300); }
        }, 100);
      });
    });
  </script>

</body>
</html>
